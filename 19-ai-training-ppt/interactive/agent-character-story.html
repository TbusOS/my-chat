<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Agent 是怎么工作的？</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: 'Noto Sans SC', sans-serif;
  background: #ffffff;
  color: #1e293b;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-x: hidden;
}

/* Header */
.header {
  text-align: center;
  padding: 32px 20px 16px;
}

.header h1 {
  font-size: 32px;
  font-weight: 900;
  color: #1e293b;
  margin-bottom: 8px;
  letter-spacing: -0.5px;
}

.header h1 span {
  color: #2563eb;
}

.header p {
  font-size: 16px;
  color: #64748b;
  font-weight: 400;
}

/* Progress Bar */
.progress-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 16px 0 8px;
}

.progress-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #e2e8f0;
  transition: all 0.4s ease;
  cursor: pointer;
}

.progress-dot.active {
  background: #2563eb;
  transform: scale(1.3);
  box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.15);
}

.progress-dot.completed {
  background: #2563eb;
}

.progress-line {
  width: 24px;
  height: 2px;
  background: #e2e8f0;
  transition: background 0.4s ease;
}

.progress-line.completed {
  background: #2563eb;
}

.step-label {
  font-size: 14px;
  color: #94a3b8;
  font-weight: 500;
  margin-top: 6px;
}

.step-label strong {
  color: #2563eb;
}

/* Stage */
.stage-container {
  position: relative;
  width: 680px;
  height: 440px;
  margin: 12px 0 16px;
  background: #f8fafc;
  border-radius: 20px;
  border: 2px solid #e2e8f0;
  overflow: hidden;
  box-shadow: 0 4px 24px rgba(0,0,0,0.04);
}

.stage {
  position: relative;
  width: 100%;
  height: 100%;
}

/* Step title inside stage */
.step-title {
  position: absolute;
  top: 14px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 15px;
  font-weight: 700;
  color: #2563eb;
  background: #eff6ff;
  padding: 4px 18px;
  border-radius: 20px;
  z-index: 20;
  white-space: nowrap;
  opacity: 0;
  transition: opacity 0.5s ease;
}

.step-title.visible {
  opacity: 1;
}

/* Character */
.character-wrapper {
  position: absolute;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  transition: left 0.8s ease, transform 0.8s ease;
}

.character-wrapper.idle {
  animation: bobbing 2s ease-in-out infinite;
}

.character-wrapper.nod {
  animation: nod 0.5s ease-in-out 2;
}

.character-wrapper.thinking {
  animation: thinking-bob 2.5s ease-in-out infinite;
}

.character-wrapper.eureka {
  animation: eureka 0.6s ease-out;
}

.character-wrapper.celebrate {
  animation: celebrate 0.5s ease-in-out 3;
}

.character-wrapper.pos-right {
  left: 62%;
}

.character-wrapper.pos-center {
  left: 50%;
}

.character-wrapper.pos-left {
  left: 40%;
}

@keyframes bobbing {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  50% { transform: translateX(-50%) translateY(-6px); }
}

@keyframes nod {
  0%, 100% { transform: translateX(-50%) rotate(0deg); }
  30% { transform: translateX(-50%) rotate(8deg); }
  60% { transform: translateX(-50%) rotate(-4deg); }
}

@keyframes thinking-bob {
  0%, 100% { transform: translateX(-50%) translateY(0) rotate(0deg); }
  30% { transform: translateX(-50%) translateY(-4px) rotate(-2deg); }
  70% { transform: translateX(-50%) translateY(-2px) rotate(2deg); }
}

@keyframes eureka {
  0% { transform: translateX(-50%) translateY(0) scale(1); }
  40% { transform: translateX(-50%) translateY(-20px) scale(1.1); }
  100% { transform: translateX(-50%) translateY(0) scale(1); }
}

@keyframes celebrate {
  0%, 100% { transform: translateX(-50%) translateY(0) rotate(0deg); }
  25% { transform: translateX(-50%) translateY(-15px) rotate(-8deg); }
  75% { transform: translateX(-50%) translateY(-15px) rotate(8deg); }
}

/* Character SVG parts */
.char-arm-left, .char-arm-right {
  transition: transform 0.4s ease;
  transform-origin: center top;
}

.character-wrapper.wave .char-arm-right {
  animation: wave-arm 0.6s ease-in-out 2;
}

.character-wrapper.reach .char-arm-right {
  transform: rotate(-60deg) translateX(5px);
}

.character-wrapper.point .char-arm-right {
  transform: rotate(-45deg) translateX(10px) translateY(-10px);
}

.character-wrapper.chin .char-arm-right {
  transform: rotate(-70deg) translateX(2px) translateY(-15px);
}

.character-wrapper.present .char-arm-left,
.character-wrapper.present .char-arm-right {
  transform: rotate(-40deg);
}

@keyframes wave-arm {
  0%, 100% { transform: rotate(0deg); }
  50% { transform: rotate(-40deg); }
}

/* Character eyes */
.char-eye {
  transition: all 0.3s ease;
}

.character-wrapper.look-left .char-eye {
  transform: translateX(-2px);
}

/* Character mouth */
.char-mouth {
  transition: all 0.3s ease;
}

.character-wrapper.surprise .char-mouth {
  rx: 4;
  ry: 4;
}

/* Lightbulb */
.lightbulb {
  position: absolute;
  top: -45px;
  left: 50%;
  transform: translateX(-50%);
  opacity: 0;
  transition: opacity 0.5s ease;
}

.lightbulb.on {
  opacity: 1;
  animation: glow-pulse 1.5s ease-in-out infinite;
}

@keyframes glow-pulse {
  0%, 100% { filter: drop-shadow(0 0 4px rgba(250, 204, 21, 0.4)); }
  50% { filter: drop-shadow(0 0 12px rgba(250, 204, 21, 0.8)); }
}

/* Exclamation */
.exclamation {
  position: absolute;
  top: -40px;
  right: -30px;
  font-size: 32px;
  font-weight: 900;
  color: #ef4444;
  opacity: 0;
  transform: scale(0);
  transition: all 0.3s ease;
}

.exclamation.visible {
  opacity: 1;
  transform: scale(1);
  animation: exclaim-pop 0.5s ease-out;
}

@keyframes exclaim-pop {
  0% { transform: scale(0) rotate(-20deg); }
  60% { transform: scale(1.3) rotate(5deg); }
  100% { transform: scale(1) rotate(0deg); }
}

/* Speech Bubbles */
.bubble {
  position: absolute;
  background: #ffffff;
  border: 2px solid #e2e8f0;
  border-radius: 16px;
  padding: 12px 18px;
  font-size: 14px;
  line-height: 1.6;
  color: #334155;
  box-shadow: 0 4px 16px rgba(0,0,0,0.06);
  opacity: 0;
  transform: scale(0.8) translateY(10px);
  transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  z-index: 15;
  max-width: 240px;
}

.bubble.visible {
  opacity: 1;
  transform: scale(1) translateY(0);
}

.bubble::after {
  content: '';
  position: absolute;
  width: 0;
  height: 0;
}

.bubble.tail-right::after {
  bottom: 20px;
  right: -10px;
  border-left: 10px solid #ffffff;
  border-top: 6px solid transparent;
  border-bottom: 6px solid transparent;
}

.bubble.tail-left::after {
  bottom: 20px;
  left: -10px;
  border-right: 10px solid #ffffff;
  border-top: 6px solid transparent;
  border-bottom: 6px solid transparent;
}

.bubble.tail-bottom::after {
  bottom: -10px;
  left: 50%;
  transform: translateX(-50%);
  border-top: 10px solid #ffffff;
  border-left: 6px solid transparent;
  border-right: 6px solid transparent;
}

/* Thought bubble */
.thought-bubble {
  position: absolute;
  background: #ffffff;
  border: 2px solid #e2e8f0;
  border-radius: 20px;
  padding: 16px 20px;
  font-size: 13px;
  line-height: 1.8;
  color: #334155;
  box-shadow: 0 4px 16px rgba(0,0,0,0.06);
  opacity: 0;
  transform: scale(0.8);
  transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  z-index: 15;
}

.thought-bubble.visible {
  opacity: 1;
  transform: scale(1);
}

.thought-bubble .thought-dots {
  position: absolute;
  bottom: -20px;
  left: 30px;
}

.thought-bubble .thought-dots span {
  display: inline-block;
  width: 8px;
  height: 8px;
  background: #e2e8f0;
  border-radius: 50%;
  margin: 0 2px;
}

.thought-bubble .thought-dots span:first-child {
  width: 12px;
  height: 12px;
}

.thought-bubble .thought-dots span:last-child {
  width: 5px;
  height: 5px;
}

/* Checklist items */
.checklist-item {
  opacity: 0;
  transform: translateX(-10px);
  transition: all 0.4s ease;
  white-space: nowrap;
}

.checklist-item.visible {
  opacity: 1;
  transform: translateX(0);
}

.checklist-item .num {
  color: #2563eb;
  font-weight: 700;
  margin-right: 4px;
}

/* Toolbox */
.toolbox {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%) translateY(100%);
  transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  z-index: 8;
}

.toolbox.open {
  transform: translateX(-50%) translateY(0);
}

.toolbox-body {
  background: #1e293b;
  border-radius: 12px 12px 0 0;
  padding: 16px 20px 12px;
  display: flex;
  gap: 16px;
}

.tool-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  opacity: 0;
  transform: translateY(10px);
  transition: all 0.4s ease;
}

.tool-item.visible {
  opacity: 1;
  transform: translateY(0);
}

.tool-item.grabbed {
  transform: translateY(-10px) scale(1.15);
  filter: drop-shadow(0 4px 8px rgba(37, 99, 235, 0.3));
}

.tool-icon {
  width: 44px;
  height: 44px;
  background: #334155;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  transition: all 0.3s ease;
}

.tool-item.visible .tool-icon {
  animation: tool-wiggle 0.5s ease-in-out;
  animation-delay: var(--delay, 0s);
}

.tool-item.grabbed .tool-icon {
  background: #2563eb;
  box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.3);
}

@keyframes tool-wiggle {
  0%, 100% { transform: rotate(0deg); }
  25% { transform: rotate(-8deg); }
  75% { transform: rotate(8deg); }
}

.tool-label {
  font-size: 11px;
  color: #94a3b8;
  font-weight: 500;
}

/* Code panel */
.code-panel {
  position: absolute;
  background: #1e293b;
  border-radius: 12px;
  padding: 0;
  font-family: 'Courier New', monospace;
  font-size: 12px;
  line-height: 1.7;
  color: #e2e8f0;
  box-shadow: 0 8px 32px rgba(0,0,0,0.12);
  opacity: 0;
  transform: scale(0.9) translateY(10px);
  transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  z-index: 14;
  overflow: hidden;
}

.code-panel.visible {
  opacity: 1;
  transform: scale(1) translateY(0);
}

.code-panel-header {
  background: #334155;
  padding: 6px 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.code-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}

.code-dot.red { background: #ef4444; }
.code-dot.yellow { background: #eab308; }
.code-dot.green { background: #22c55e; }

.code-panel-title {
  font-size: 11px;
  color: #94a3b8;
  margin-left: 6px;
  font-family: 'Noto Sans SC', sans-serif;
}

.code-panel-body {
  padding: 12px 16px;
}

.code-line {
  opacity: 0;
  transform: translateX(-5px);
  transition: all 0.3s ease;
  white-space: nowrap;
}

.code-line.visible {
  opacity: 1;
  transform: translateX(0);
}

.code-comment { color: #64748b; }
.code-keyword { color: #818cf8; }
.code-func { color: #38bdf8; }
.code-string { color: #34d399; }
.code-warning { color: #fbbf24; }

/* Metrics panel */
.metrics-panel {
  position: absolute;
  background: #ffffff;
  border: 2px solid #fbbf24;
  border-radius: 12px;
  padding: 12px 18px;
  font-size: 13px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.06);
  opacity: 0;
  transform: scale(0.8);
  transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  z-index: 14;
}

.metrics-panel.visible {
  opacity: 1;
  transform: scale(1);
}

.metric-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 4px 0;
}

.metric-label { color: #64748b; }
.metric-value { color: #ef4444; font-weight: 700; }

/* Analysis bubble */
.analysis-bubble {
  position: absolute;
  background: #ffffff;
  border: 2px solid #e2e8f0;
  border-radius: 16px;
  padding: 16px 20px;
  font-size: 13px;
  line-height: 1.8;
  box-shadow: 0 4px 16px rgba(0,0,0,0.06);
  opacity: 0;
  transform: scale(0.8) translateY(10px);
  transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  z-index: 15;
}

.analysis-bubble.visible {
  opacity: 1;
  transform: scale(1) translateY(0);
}

.analysis-title {
  font-weight: 700;
  color: #1e293b;
  margin-bottom: 6px;
}

.analysis-item {
  opacity: 0;
  transform: translateX(-8px);
  transition: all 0.4s ease;
}

.analysis-item.visible {
  opacity: 1;
  transform: translateX(0);
}

/* Report */
.report-panel {
  position: absolute;
  background: #ffffff;
  border: 2px solid #22c55e;
  border-radius: 16px;
  padding: 0;
  font-size: 13px;
  line-height: 1.8;
  box-shadow: 0 8px 32px rgba(34, 197, 94, 0.12);
  opacity: 0;
  transform: scale(0.5) rotate(-5deg);
  transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  z-index: 15;
  overflow: hidden;
}

.report-panel.visible {
  opacity: 1;
  transform: scale(1) rotate(0deg);
}

.report-header {
  background: #22c55e;
  color: white;
  padding: 8px 18px;
  font-weight: 700;
  font-size: 14px;
}

.report-body {
  padding: 14px 18px;
}

.report-item {
  opacity: 0;
  transform: translateX(-8px);
  transition: all 0.4s ease;
}

.report-item.visible {
  opacity: 1;
  transform: translateX(0);
}

.report-effect {
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px dashed #e2e8f0;
  font-weight: 700;
  color: #2563eb;
}

/* Flying file */
.flying-file {
  position: absolute;
  font-size: 28px;
  opacity: 0;
  z-index: 12;
  pointer-events: none;
}

.flying-file.fly {
  animation: file-fly 1s ease-out forwards;
}

@keyframes file-fly {
  0% { opacity: 0; transform: translate(200px, -50px) scale(0.5) rotate(20deg); }
  50% { opacity: 1; }
  100% { opacity: 0; transform: translate(0, 0) scale(1) rotate(0deg); }
}

/* Confetti */
.confetti-container {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 30;
  overflow: hidden;
}

.confetti {
  position: absolute;
  width: 8px;
  height: 8px;
  border-radius: 2px;
  opacity: 0;
}

.confetti.active {
  animation: confetti-fall 2s ease-out forwards;
}

@keyframes confetti-fall {
  0% { opacity: 1; transform: translateY(-20px) rotate(0deg) scale(1); }
  100% { opacity: 0; transform: translateY(400px) rotate(720deg) scale(0.5); }
}

/* Controls */
.controls {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 8px 0 32px;
}

.btn {
  padding: 10px 24px;
  border: none;
  border-radius: 10px;
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
  display: flex;
  align-items: center;
  gap: 6px;
}

.btn:hover {
  transform: translateY(-1px);
}

.btn:active {
  transform: translateY(0);
}

.btn-primary {
  background: #2563eb;
  color: white;
  box-shadow: 0 2px 8px rgba(37, 99, 235, 0.3);
}

.btn-primary:hover {
  background: #1d4ed8;
  box-shadow: 0 4px 12px rgba(37, 99, 235, 0.4);
}

.btn-primary:disabled {
  background: #94a3b8;
  box-shadow: none;
  cursor: not-allowed;
  transform: none;
}

.btn-secondary {
  background: #f1f5f9;
  color: #475569;
  border: 1px solid #e2e8f0;
}

.btn-secondary:hover {
  background: #e2e8f0;
}

.btn-auto {
  background: #f0fdf4;
  color: #16a34a;
  border: 1px solid #bbf7d0;
}

.btn-auto:hover {
  background: #dcfce7;
}

.btn-auto.playing {
  background: #fef2f2;
  color: #dc2626;
  border-color: #fecaca;
}

/* User avatar */
.user-avatar {
  position: absolute;
  z-index: 10;
  opacity: 0;
  transform: translateX(-30px);
  transition: all 0.5s ease;
}

.user-avatar.visible {
  opacity: 1;
  transform: translateX(0);
}

/* Tool held indicator */
.held-tool {
  position: absolute;
  top: 10px;
  right: -20px;
  font-size: 20px;
  opacity: 0;
  transition: all 0.3s ease;
  z-index: 11;
}

.held-tool.visible {
  opacity: 1;
  animation: tool-held-bounce 0.5s ease-out;
}

@keyframes tool-held-bounce {
  0% { transform: scale(0); }
  60% { transform: scale(1.2); }
  100% { transform: scale(1); }
}

/* Ground shadow */
.ground-shadow {
  position: absolute;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%);
  width: 60px;
  height: 8px;
  background: radial-gradient(ellipse, rgba(0,0,0,0.08) 0%, transparent 70%);
  z-index: 5;
  transition: left 0.8s ease;
}

/* Responsive */
@media (max-width: 720px) {
  .stage-container {
    width: 95vw;
    height: 380px;
  }
  .header h1 { font-size: 24px; }
  .bubble, .thought-bubble, .analysis-bubble { font-size: 12px; max-width: 180px; }
  .code-panel { font-size: 10px; }
}
</style>
</head>
<body>

<div class="header">
  <h1><span>AI Agent</span> 是怎么工作的？</h1>
  <p>看一个卡通小助手如何帮你解决问题</p>
</div>

<div class="progress-bar" id="progressBar">
  <div class="progress-dot active" data-step="0" onclick="goToStep(0)"></div>
  <div class="progress-line" data-line="0"></div>
  <div class="progress-dot" data-step="1" onclick="goToStep(1)"></div>
  <div class="progress-line" data-line="1"></div>
  <div class="progress-dot" data-step="2" onclick="goToStep(2)"></div>
  <div class="progress-line" data-line="2"></div>
  <div class="progress-dot" data-step="3" onclick="goToStep(3)"></div>
  <div class="progress-line" data-line="3"></div>
  <div class="progress-dot" data-step="4" onclick="goToStep(4)"></div>
  <div class="progress-line" data-line="4"></div>
  <div class="progress-dot" data-step="5" onclick="goToStep(5)"></div>
</div>
<div class="step-label" id="stepLabel">步骤 <strong>1</strong> / 6</div>

<div class="stage-container">
  <div class="stage" id="stage">
    <div class="step-title" id="stepTitle"></div>

    <!-- Ground shadow -->
    <div class="ground-shadow" id="groundShadow"></div>

    <!-- Character -->
    <div class="character-wrapper idle" id="character">
      <!-- Lightbulb above head -->
      <div class="lightbulb" id="lightbulb">
        <svg width="30" height="36" viewBox="0 0 30 36">
          <ellipse cx="15" cy="14" rx="11" ry="12" fill="#fbbf24" opacity="0.3"/>
          <path d="M15 2 C8 2 3 7.5 3 14 C3 19 6 22 9 24 L9 28 L21 28 L21 24 C24 22 27 19 27 14 C27 7.5 22 2 15 2Z" fill="#fbbf24"/>
          <rect x="10" y="28" width="10" height="3" rx="1" fill="#d4a017"/>
          <rect x="11" y="31" width="8" height="2" rx="1" fill="#d4a017"/>
          <path d="M15 8 L15 18 M10 13 L20 13" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
        </svg>
      </div>

      <!-- Exclamation mark -->
      <div class="exclamation" id="exclamation">!</div>

      <!-- Held tool -->
      <div class="held-tool" id="heldTool"></div>

      <!-- SVG Character -->
      <svg width="100" height="140" viewBox="0 0 100 140" id="charSvg">
        <!-- Body -->
        <rect class="char-body" x="30" y="62" width="40" height="45" rx="12" fill="#2563eb"/>

        <!-- Legs -->
        <rect x="35" y="102" width="12" height="22" rx="6" fill="#1d4ed8"/>
        <rect x="53" y="102" width="12" height="22" rx="6" fill="#1d4ed8"/>

        <!-- Shoes -->
        <ellipse cx="41" cy="126" rx="9" ry="5" fill="#1e293b"/>
        <ellipse cx="59" cy="126" rx="9" ry="5" fill="#1e293b"/>

        <!-- Arms -->
        <g class="char-arm-left">
          <rect x="17" y="66" width="14" height="30" rx="7" fill="#2563eb"/>
          <circle cx="24" cy="98" r="6" fill="#fde68a"/>
        </g>
        <g class="char-arm-right">
          <rect x="69" y="66" width="14" height="30" rx="7" fill="#2563eb"/>
          <circle cx="76" cy="98" r="6" fill="#fde68a"/>
        </g>

        <!-- Head -->
        <circle cx="50" cy="36" r="28" fill="#fde68a"/>

        <!-- Hat -->
        <path d="M25 32 Q25 14 50 10 Q75 14 75 32 Z" fill="#2563eb"/>
        <rect x="20" y="30" width="60" height="6" rx="3" fill="#1d4ed8"/>

        <!-- Face -->
        <g class="char-face">
          <!-- Eyes -->
          <circle class="char-eye" cx="40" cy="38" r="3.5" fill="#1e293b"/>
          <circle class="char-eye" cx="60" cy="38" r="3.5" fill="#1e293b"/>
          <!-- Eye shine -->
          <circle cx="41.5" cy="36.5" r="1.2" fill="white"/>
          <circle cx="61.5" cy="36.5" r="1.2" fill="white"/>
          <!-- Mouth -->
          <ellipse class="char-mouth" cx="50" cy="50" rx="6" ry="3" fill="#1e293b"/>
          <!-- Blush -->
          <ellipse cx="34" cy="48" rx="5" ry="3" fill="#fca5a5" opacity="0.4"/>
          <ellipse cx="66" cy="48" rx="5" ry="3" fill="#fca5a5" opacity="0.4"/>
        </g>
      </svg>
    </div>

    <!-- Confetti container -->
    <div class="confetti-container" id="confettiContainer"></div>
  </div>
</div>

<div class="controls">
  <button class="btn btn-secondary" id="btnReplay" onclick="replay()">重播</button>
  <button class="btn btn-primary" id="btnNext" onclick="nextStep()">下一步</button>
  <button class="btn btn-auto" id="btnAuto" onclick="toggleAutoPlay()">自动播放</button>
</div>

<script>
const STEPS = [
  { title: '第一步：接收任务', key: 'receive' },
  { title: '第二步：思考规划', key: 'think' },
  { title: '第三步：打开工具箱', key: 'toolbox' },
  { title: '第四步：执行工具', key: 'execute' },
  { title: '第五步：分析结果', key: 'analyze' },
  { title: '第六步：交付结果', key: 'deliver' }
];

let currentStep = -1;
let autoPlayInterval = null;
let dynamicElements = [];

const stage = document.getElementById('stage');
const character = document.getElementById('character');
const stepTitle = document.getElementById('stepTitle');
const lightbulb = document.getElementById('lightbulb');
const exclamation = document.getElementById('exclamation');
const heldTool = document.getElementById('heldTool');
const groundShadow = document.getElementById('groundShadow');
const confettiContainer = document.getElementById('confettiContainer');

function clearDynamic() {
  dynamicElements.forEach(el => {
    if (el && el.parentNode) el.parentNode.removeChild(el);
  });
  dynamicElements = [];

  character.className = 'character-wrapper idle pos-center';
  groundShadow.style.left = '50%';
  stepTitle.classList.remove('visible');
  lightbulb.classList.remove('on');
  exclamation.classList.remove('visible');
  heldTool.classList.remove('visible');
  heldTool.textContent = '';
  confettiContainer.innerHTML = '';
}

function createElement(tag, attrs, parent) {
  const el = document.createElement(tag);
  if (attrs) {
    Object.keys(attrs).forEach(k => {
      if (k === 'style' && typeof attrs[k] === 'object') {
        Object.assign(el.style, attrs[k]);
      } else if (k === 'className') {
        el.className = attrs[k];
      } else if (k === 'innerHTML') {
        el.innerHTML = attrs[k];
      } else if (k === 'textContent') {
        el.textContent = attrs[k];
      } else {
        el.setAttribute(k, attrs[k]);
      }
    });
  }
  (parent || stage).appendChild(el);
  dynamicElements.push(el);
  return el;
}

function delay(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

function updateProgress(step) {
  document.querySelectorAll('.progress-dot').forEach((dot, i) => {
    dot.classList.toggle('active', i === step);
    dot.classList.toggle('completed', i < step);
  });
  document.querySelectorAll('.progress-line').forEach((line, i) => {
    line.classList.toggle('completed', i < step);
  });
  document.getElementById('stepLabel').innerHTML = `步骤 <strong>${step + 1}</strong> / 6`;
}

/* ===== STEP 0: Receive Task ===== */
async function stepReceive() {
  character.className = 'character-wrapper idle pos-right';
  groundShadow.style.left = '62%';

  stepTitle.textContent = STEPS[0].title;
  await delay(200);
  stepTitle.classList.add('visible');

  // User avatar
  const userAvatar = createElement('div', {
    className: 'user-avatar',
    style: { left: '30px', bottom: '50px' },
    innerHTML: `<svg width="60" height="80" viewBox="0 0 60 80">
      <circle cx="30" cy="26" r="20" fill="#e2e8f0"/>
      <circle cx="30" cy="26" r="16" fill="#fde68a"/>
      <circle cx="24" cy="24" r="2" fill="#1e293b"/>
      <circle cx="36" cy="24" r="2" fill="#1e293b"/>
      <path d="M26 32 Q30 36 34 32" stroke="#1e293b" fill="none" stroke-width="1.5" stroke-linecap="round"/>
      <rect x="15" y="44" width="30" height="30" rx="10" fill="#64748b"/>
      <rect x="10" y="70" width="16" height="10" rx="5" fill="#64748b"/>
      <rect x="34" y="70" width="16" height="10" rx="5" fill="#64748b"/>
    </svg>`
  });

  await delay(300);
  userAvatar.classList.add('visible');

  // User speech bubble
  const userBubble = createElement('div', {
    className: 'bubble tail-right',
    style: { left: '90px', bottom: '100px', maxWidth: '200px' },
    textContent: '帮我看看这个项目，最近响应速度变慢了'
  });

  await delay(500);
  userBubble.classList.add('visible');

  // Character looks left
  await delay(600);
  character.className = 'character-wrapper nod pos-right look-left';

  // Character response bubble
  const charBubble = createElement('div', {
    className: 'bubble tail-left',
    style: { right: '80px', bottom: '180px', maxWidth: '140px' },
    innerHTML: '<span style="font-weight:700;color:#2563eb">收到！</span><br>我来帮你排查一下'
  });

  await delay(800);
  charBubble.classList.add('visible');

  await delay(600);
  character.className = 'character-wrapper idle pos-right look-left';
}

/* ===== STEP 1: Think & Plan ===== */
async function stepThink() {
  character.className = 'character-wrapper thinking pos-center';
  groundShadow.style.left = '50%';

  stepTitle.textContent = STEPS[1].title;
  await delay(200);
  stepTitle.classList.add('visible');

  // Lightbulb
  await delay(500);
  lightbulb.classList.add('on');

  // Thought bubble with checklist
  const thought = createElement('div', {
    className: 'thought-bubble',
    style: { right: '60px', top: '40px', maxWidth: '260px' },
    innerHTML: `
      <div style="font-weight:700;color:#2563eb;margin-bottom:6px">思考规划中...</div>
      <div class="checklist-item" data-idx="0"><span class="num">1.</span> 先读取项目结构</div>
      <div class="checklist-item" data-idx="1"><span class="num">2.</span> 找到可能的性能瓶颈</div>
      <div class="checklist-item" data-idx="2"><span class="num">3.</span> 分析关键代码路径</div>
      <div class="checklist-item" data-idx="3"><span class="num">4.</span> 给出优化建议</div>
      <div class="thought-dots"><span></span><span></span><span></span></div>
    `
  });

  await delay(400);
  thought.classList.add('visible');

  // Animate checklist items one by one
  const items = thought.querySelectorAll('.checklist-item');
  for (let i = 0; i < items.length; i++) {
    await delay(500);
    items[i].classList.add('visible');
  }
}

/* ===== STEP 2: Open Toolbox ===== */
async function stepToolbox() {
  character.className = 'character-wrapper idle pos-center';
  groundShadow.style.left = '50%';

  stepTitle.textContent = STEPS[2].title;
  await delay(200);
  stepTitle.classList.add('visible');

  // Toolbox
  const toolbox = createElement('div', {
    className: 'toolbox',
    innerHTML: `
      <div class="toolbox-body">
        <div class="tool-item" style="--delay:0.1s" data-tool="read">
          <div class="tool-icon">📁</div>
          <span class="tool-label">Read</span>
        </div>
        <div class="tool-item" style="--delay:0.2s" data-tool="grep">
          <div class="tool-icon">🔍</div>
          <span class="tool-label">Grep</span>
        </div>
        <div class="tool-item" style="--delay:0.3s" data-tool="bash">
          <div class="tool-icon">💻</div>
          <span class="tool-label">Bash</span>
        </div>
        <div class="tool-item" style="--delay:0.4s" data-tool="analyze">
          <div class="tool-icon">📊</div>
          <span class="tool-label">Analyze</span>
        </div>
      </div>
    `
  });

  await delay(400);
  toolbox.classList.add('open');

  // Show tool items
  const tools = toolbox.querySelectorAll('.tool-item');
  for (let i = 0; i < tools.length; i++) {
    await delay(200);
    tools[i].classList.add('visible');
  }

  // Character reaches for Read tool
  await delay(600);
  character.className = 'character-wrapper reach pos-center';

  await delay(400);
  tools[0].classList.add('grabbed');

  await delay(300);
  heldTool.textContent = '📁';
  heldTool.classList.add('visible');

  character.className = 'character-wrapper idle pos-center';
}

/* ===== STEP 3: Execute Tools ===== */
async function stepExecute() {
  character.className = 'character-wrapper idle pos-left';
  groundShadow.style.left = '40%';

  stepTitle.textContent = STEPS[3].title;
  await delay(200);
  stepTitle.classList.add('visible');

  heldTool.textContent = '📁';
  heldTool.classList.add('visible');

  // Flying file
  const flyingFile = createElement('div', {
    className: 'flying-file',
    style: { right: '80px', top: '80px' },
    textContent: '📄'
  });

  await delay(400);
  flyingFile.classList.add('fly');

  // Code panel
  const codePanel = createElement('div', {
    className: 'code-panel',
    style: { right: '30px', top: '50px', width: '310px' },
    innerHTML: `
      <div class="code-panel-header">
        <div class="code-dot red"></div>
        <div class="code-dot yellow"></div>
        <div class="code-dot green"></div>
        <span class="code-panel-title">database.py</span>
      </div>
      <div class="code-panel-body">
        <div class="code-line" data-idx="0"><span class="code-comment"># database.py</span></div>
        <div class="code-line" data-idx="1"><span class="code-keyword">def</span> <span class="code-func">get_users</span>():</div>
        <div class="code-line" data-idx="2">&nbsp;&nbsp;users = db.query(<span class="code-string">"SELECT * FROM users"</span>)</div>
        <div class="code-line" data-idx="3">&nbsp;&nbsp;<span class="code-comment code-warning"># 没有分页！</span></div>
        <div class="code-line" data-idx="4">&nbsp;&nbsp;<span class="code-keyword">return</span> serialize(users)</div>
        <div class="code-line" data-idx="5">&nbsp;&nbsp;<span class="code-comment code-warning"># 全量序列化</span></div>
      </div>
    `
  });

  await delay(600);
  codePanel.classList.add('visible');

  // Animate code lines
  const codeLines = codePanel.querySelectorAll('.code-line');
  for (let i = 0; i < codeLines.length; i++) {
    await delay(300);
    codeLines[i].classList.add('visible');
  }

  // Character points and exclaims
  await delay(400);
  character.className = 'character-wrapper point pos-left';
  exclamation.classList.add('visible');

  // Switch to Bash tool
  await delay(800);
  exclamation.classList.remove('visible');
  heldTool.textContent = '💻';
  character.className = 'character-wrapper idle pos-left';

  // Metrics panel
  const metrics = createElement('div', {
    className: 'metrics-panel',
    style: { right: '40px', bottom: '50px' },
    innerHTML: `
      <div style="font-weight:700;color:#1e293b;margin-bottom:6px">性能测试结果</div>
      <div class="metric-row">
        <span class="metric-label">响应时间：</span>
        <span class="metric-value">3.2s</span>
      </div>
      <div class="metric-row">
        <span class="metric-label">内存占用：</span>
        <span class="metric-value">850MB</span>
      </div>
    `
  });

  await delay(600);
  metrics.classList.add('visible');
}

/* ===== STEP 4: Analyze ===== */
async function stepAnalyze() {
  character.className = 'character-wrapper chin thinking pos-center';
  groundShadow.style.left = '50%';

  stepTitle.textContent = STEPS[4].title;
  await delay(200);
  stepTitle.classList.add('visible');

  heldTool.classList.remove('visible');

  await delay(800);

  // Analysis bubble
  const analysis = createElement('div', {
    className: 'analysis-bubble',
    style: { right: '50px', top: '50px', maxWidth: '300px' },
    innerHTML: `
      <div class="analysis-title">发现 2 个性能问题：</div>
      <div class="analysis-item" data-idx="0" style="color:#dc2626">&#10060; 数据库查询无分页，加载全量数据</div>
      <div class="analysis-item" data-idx="1" style="color:#dc2626">&#10060; 序列化无缓存，重复计算</div>
    `
  });

  await delay(400);
  analysis.classList.add('visible');

  const items = analysis.querySelectorAll('.analysis-item');
  for (let i = 0; i < items.length; i++) {
    await delay(600);
    items[i].classList.add('visible');
  }

  // Eureka!
  await delay(500);
  character.className = 'character-wrapper eureka pos-center';

  await delay(600);
  // Small lightbulb flash
  lightbulb.classList.add('on');
  await delay(300);
  lightbulb.classList.remove('on');

  character.className = 'character-wrapper idle pos-center';
}

/* ===== STEP 5: Deliver ===== */
async function stepDeliver() {
  character.className = 'character-wrapper present pos-left';
  groundShadow.style.left = '40%';

  stepTitle.textContent = STEPS[5].title;
  await delay(200);
  stepTitle.classList.add('visible');

  // Report panel
  const report = createElement('div', {
    className: 'report-panel',
    style: { right: '40px', top: '40px', width: '280px' },
    innerHTML: `
      <div class="report-header">优化方案</div>
      <div class="report-body">
        <div class="report-item" data-idx="0" style="color:#16a34a">&#9989; 添加分页查询 (LIMIT/OFFSET)</div>
        <div class="report-item" data-idx="1" style="color:#16a34a">&#9989; 引入 Redis 缓存序列化结果</div>
        <div class="report-item report-effect" data-idx="2">预期效果：响应时间 3.2s → 0.3s</div>
      </div>
    `
  });

  await delay(500);
  report.classList.add('visible');

  const items = report.querySelectorAll('.report-item');
  for (let i = 0; i < items.length; i++) {
    await delay(500);
    items[i].classList.add('visible');
  }

  // User "太棒了！" bubble
  const userBubble = createElement('div', {
    className: 'bubble tail-right',
    style: { left: '30px', bottom: '130px', maxWidth: '140px' },
    innerHTML: '<span style="font-weight:700;font-size:16px">太棒了！</span>'
  });

  // User avatar
  const userAvatar = createElement('div', {
    className: 'user-avatar',
    style: { left: '30px', bottom: '40px' },
    innerHTML: `<svg width="50" height="70" viewBox="0 0 60 80">
      <circle cx="30" cy="26" r="20" fill="#e2e8f0"/>
      <circle cx="30" cy="26" r="16" fill="#fde68a"/>
      <circle cx="24" cy="24" r="2" fill="#1e293b"/>
      <circle cx="36" cy="24" r="2" fill="#1e293b"/>
      <path d="M24 32 Q30 38 36 32" stroke="#1e293b" fill="none" stroke-width="2" stroke-linecap="round"/>
      <rect x="15" y="44" width="30" height="30" rx="10" fill="#64748b"/>
    </svg>`
  });

  await delay(600);
  userAvatar.classList.add('visible');
  await delay(300);
  userBubble.classList.add('visible');

  // Celebration
  await delay(500);
  character.className = 'character-wrapper celebrate pos-left';

  // Confetti
  spawnConfetti();

  await delay(1500);
  character.className = 'character-wrapper idle pos-left';
}

function spawnConfetti() {
  const colors = ['#2563eb', '#22c55e', '#eab308', '#ef4444', '#a855f7', '#f97316'];
  for (let i = 0; i < 40; i++) {
    const confetti = document.createElement('div');
    confetti.className = 'confetti';
    confetti.style.left = (Math.random() * 100) + '%';
    confetti.style.top = '-10px';
    confetti.style.width = (4 + Math.random() * 6) + 'px';
    confetti.style.height = (4 + Math.random() * 6) + 'px';
    confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
    confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    confetti.style.animationDelay = (Math.random() * 0.8) + 's';
    confetti.style.animationDuration = (1.5 + Math.random() * 1) + 's';
    confettiContainer.appendChild(confetti);
    setTimeout(() => confetti.classList.add('active'), 10);
  }
}

/* ===== Navigation ===== */
const stepFunctions = [stepReceive, stepThink, stepToolbox, stepExecute, stepAnalyze, stepDeliver];

async function goToStep(step) {
  if (step < 0 || step > 5) return;
  if (step === currentStep) return;

  currentStep = step;
  clearDynamic();
  updateProgress(step);

  const btnNext = document.getElementById('btnNext');
  btnNext.disabled = false;
  btnNext.textContent = step < 5 ? '下一步' : '完成';
  if (step >= 5) {
    btnNext.disabled = true;
  }

  await stepFunctions[step]();
}

async function nextStep() {
  if (currentStep >= 5) return;
  await goToStep(currentStep + 1);
}

function replay() {
  stopAutoPlay();
  currentStep = -1;
  clearDynamic();
  updateProgress(0);
  document.getElementById('btnNext').disabled = false;
  document.getElementById('btnNext').textContent = '下一步';
  goToStep(0);
}

let isAutoPlaying = false;

function toggleAutoPlay() {
  if (isAutoPlaying) {
    stopAutoPlay();
  } else {
    startAutoPlay();
  }
}

function startAutoPlay() {
  isAutoPlaying = true;
  const btn = document.getElementById('btnAuto');
  btn.textContent = '暂停播放';
  btn.classList.add('playing');
  document.getElementById('btnNext').disabled = true;

  const advanceStep = async () => {
    if (!isAutoPlaying) return;
    if (currentStep >= 5) {
      stopAutoPlay();
      return;
    }
    await goToStep(currentStep < 0 ? 0 : currentStep + 1);
    if (isAutoPlaying) {
      autoPlayInterval = setTimeout(advanceStep, 3500);
    }
  };

  advanceStep();
}

function stopAutoPlay() {
  isAutoPlaying = false;
  if (autoPlayInterval) {
    clearTimeout(autoPlayInterval);
    autoPlayInterval = null;
  }
  const btn = document.getElementById('btnAuto');
  btn.textContent = '自动播放';
  btn.classList.remove('playing');
  document.getElementById('btnNext').disabled = (currentStep >= 5);
}

// Keyboard support
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') {
    e.preventDefault();
    if (!isAutoPlaying) nextStep();
  }
  if (e.key === 'ArrowLeft') {
    e.preventDefault();
    if (!isAutoPlaying && currentStep > 0) goToStep(currentStep - 1);
  }
  if (e.key === 'r' || e.key === 'R') {
    replay();
  }
});

// Start at step 0
goToStep(0);
</script>
</body>
</html>
