<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenClaw 五大组件协作动画</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Noto Sans SC', sans-serif;
  background: #ffffff;
  color: #1e293b;
  min-height: 100vh;
  overflow-x: hidden;
}

.container {
  max-width: 1080px;
  margin: 0 auto;
  padding: 24px 20px 40px;
}

/* Header */
.header {
  text-align: center;
  margin-bottom: 28px;
}
.header h1 {
  font-size: 28px;
  font-weight: 900;
  color: #0f172a;
  margin-bottom: 6px;
  letter-spacing: -0.5px;
}
.header .subtitle {
  font-size: 15px;
  color: #64748b;
  font-weight: 400;
}

/* Progress Bar */
.progress-section {
  margin-bottom: 20px;
}
.phase-labels {
  display: flex;
  justify-content: space-between;
  margin-bottom: 8px;
  padding: 0 2px;
}
.phase-label {
  font-size: 11px;
  color: #94a3b8;
  font-weight: 500;
  cursor: pointer;
  transition: color 0.3s;
  text-align: center;
  flex: 1;
}
.phase-label.active {
  color: #2563eb;
  font-weight: 700;
}
.phase-label.completed {
  color: #10b981;
}
.progress-track {
  height: 6px;
  background: #e2e8f0;
  border-radius: 3px;
  position: relative;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #10b981, #2563eb, #7c3aed, #f59e0b, #ef4444);
  border-radius: 3px;
  transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  width: 0%;
}

/* Stage */
.stage-wrapper {
  background: #f8fafc;
  border: 2px solid #e2e8f0;
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 20px;
  position: relative;
  overflow: hidden;
}
.stage {
  width: 100%;
  height: 420px;
  position: relative;
}

/* Characters */
.character {
  position: absolute;
  bottom: 60px;
  cursor: pointer;
  transition: transform 0.3s;
}
.character:hover {
  transform: scale(1.05);
}
.character svg {
  overflow: visible;
}
.char-label {
  text-align: center;
  font-size: 12px;
  font-weight: 700;
  margin-top: 4px;
  white-space: nowrap;
}
.char-sublabel {
  text-align: center;
  font-size: 10px;
  color: #94a3b8;
  font-weight: 400;
}

/* Idle bounce */
@keyframes idleBounce0 { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
@keyframes idleBounce1 { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
@keyframes idleBounce2 { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
@keyframes idleBounce3 { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
@keyframes idleBounce4 { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }

.char-body-0 { animation: idleBounce0 2s ease-in-out infinite; animation-delay: 0s; }
.char-body-1 { animation: idleBounce1 2s ease-in-out infinite; animation-delay: 0.4s; }
.char-body-2 { animation: idleBounce2 2s ease-in-out infinite; animation-delay: 0.8s; }
.char-body-3 { animation: idleBounce3 2s ease-in-out infinite; animation-delay: 1.2s; }
.char-body-4 { animation: idleBounce4 2s ease-in-out infinite; animation-delay: 1.6s; }

/* Character highlight */
.character.active-char .char-glow {
  opacity: 0.3;
}
.char-glow {
  opacity: 0;
  transition: opacity 0.5s;
}

/* Speech Bubbles */
.speech-bubble {
  position: absolute;
  background: white;
  border: 2px solid #e2e8f0;
  border-radius: 14px;
  padding: 10px 14px;
  font-size: 12px;
  line-height: 1.6;
  max-width: 220px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.08);
  transform: scale(0);
  opacity: 0;
  transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s;
  z-index: 10;
  pointer-events: none;
}
.speech-bubble.visible {
  transform: scale(1);
  opacity: 1;
}
.speech-bubble::after {
  content: '';
  position: absolute;
  bottom: -8px;
  left: 30px;
  width: 14px;
  height: 14px;
  background: white;
  border-right: 2px solid #e2e8f0;
  border-bottom: 2px solid #e2e8f0;
  transform: rotate(45deg);
}
.bubble-title {
  font-weight: 700;
  font-size: 11px;
  margin-bottom: 4px;
  display: block;
}

/* Message bubble (chat style) */
.chat-msg {
  position: absolute;
  background: #2563eb;
  color: white;
  border-radius: 16px 16px 16px 4px;
  padding: 10px 14px;
  font-size: 13px;
  line-height: 1.5;
  max-width: 260px;
  box-shadow: 0 4px 16px rgba(37,99,235,0.25);
  opacity: 0;
  transition: opacity 0.5s, transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  transform: translateX(-60px);
  z-index: 10;
}
.chat-msg.visible {
  opacity: 1;
  transform: translateX(0);
}
.chat-msg .msg-source {
  font-size: 10px;
  opacity: 0.7;
  margin-top: 4px;
  display: block;
}
.chat-msg.response {
  background: #10b981;
  border-radius: 16px 16px 4px 16px;
  transform: translateX(60px);
}
.chat-msg.response.visible {
  transform: translateX(0);
}

/* Glowing Orb */
.orb {
  position: absolute;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  opacity: 0;
  z-index: 8;
  pointer-events: none;
  filter: blur(0.5px);
}
@keyframes orbPulse {
  0%, 100% { box-shadow: 0 0 8px 3px currentColor; transform: scale(1); }
  50% { box-shadow: 0 0 16px 6px currentColor; transform: scale(1.15); }
}
.orb.visible {
  opacity: 1;
  animation: orbPulse 1s ease-in-out infinite;
}

/* Dotted path */
.flow-path {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 5;
}

/* Queue visualization */
.queue-vis {
  position: absolute;
  bottom: 15px;
  background: white;
  border: 2px solid #e2e8f0;
  border-radius: 10px;
  padding: 6px 12px;
  font-size: 10px;
  opacity: 0;
  transition: opacity 0.5s;
  display: flex;
  align-items: center;
  gap: 6px;
  z-index: 6;
}
.queue-vis.visible { opacity: 1; }
.queue-item {
  width: 28px;
  height: 18px;
  border-radius: 4px;
  background: #10b981;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 8px;
  font-weight: 700;
}
.queue-item.new {
  animation: queuePop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes queuePop { from { transform: scale(0); } to { transform: scale(1); } }

/* Terminal animation */
.terminal {
  position: absolute;
  background: #1e293b;
  color: #a5f3fc;
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 11px;
  font-family: 'Courier New', monospace;
  line-height: 1.6;
  max-width: 240px;
  opacity: 0;
  transition: opacity 0.5s;
  z-index: 10;
  box-shadow: 0 4px 20px rgba(0,0,0,0.2);
}
.terminal.visible { opacity: 1; }
.terminal .cmd { color: #34d399; }
.terminal .result { color: #fbbf24; }

/* Cloud icon */
.cloud-icon {
  position: absolute;
  opacity: 0;
  transition: opacity 0.5s, transform 0.5s;
  transform: translateY(10px);
  z-index: 10;
}
.cloud-icon.visible {
  opacity: 1;
  transform: translateY(0);
}

/* Monitor stats */
.monitor-stats {
  position: absolute;
  background: white;
  border: 2px solid #fecaca;
  border-radius: 10px;
  padding: 8px 12px;
  font-size: 10px;
  line-height: 1.8;
  opacity: 0;
  transition: opacity 0.5s;
  z-index: 10;
}
.monitor-stats.visible { opacity: 1; }
.stat-row { display: flex; align-items: center; gap: 4px; }
.stat-dot {
  width: 6px; height: 6px; border-radius: 50%;
  display: inline-block;
}
.stat-dot.green { background: #10b981; }
.stat-dot.blue { background: #2563eb; }
.stat-dot.yellow { background: #f59e0b; }

/* Summary bar */
.summary-bar {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  background: linear-gradient(90deg, #10b981, #2563eb, #7c3aed, #f59e0b, #ef4444);
  color: white;
  text-align: center;
  padding: 8px 16px;
  font-size: 12px;
  font-weight: 500;
  border-radius: 0 0 16px 16px;
  opacity: 0;
  transition: opacity 0.6s;
  z-index: 10;
}
.summary-bar.visible { opacity: 1; }

/* Celebration */
@keyframes celebrate {
  0%, 100% { transform: translateY(0); }
  30% { transform: translateY(-16px); }
  60% { transform: translateY(-4px); }
}

/* Phase description */
.phase-desc {
  text-align: center;
  margin-bottom: 20px;
  min-height: 64px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.phase-desc .phase-num {
  display: inline-block;
  background: #2563eb;
  color: white;
  font-size: 11px;
  font-weight: 700;
  padding: 2px 10px;
  border-radius: 10px;
  margin-bottom: 6px;
}
.phase-desc .phase-title {
  font-size: 18px;
  font-weight: 700;
  color: #0f172a;
  margin-bottom: 4px;
}
.phase-desc .phase-text {
  font-size: 13px;
  color: #64748b;
  max-width: 600px;
}

/* Controls */
.controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  flex-wrap: wrap;
}
.btn {
  border: none;
  cursor: pointer;
  font-family: 'Noto Sans SC', sans-serif;
  font-weight: 700;
  border-radius: 10px;
  padding: 10px 22px;
  font-size: 14px;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.btn:active { transform: scale(0.96); }
.btn-primary {
  background: #2563eb;
  color: white;
}
.btn-primary:hover { background: #1d4ed8; }
.btn-secondary {
  background: #f1f5f9;
  color: #475569;
}
.btn-secondary:hover { background: #e2e8f0; }
.btn-success {
  background: #10b981;
  color: white;
}
.btn-success:hover { background: #059669; }
.btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}
.btn-icon {
  font-size: 16px;
  line-height: 1;
}

/* Character detail card */
.char-card-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.3);
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}
.char-card-overlay.visible {
  opacity: 1;
  pointer-events: all;
}
.char-card {
  background: white;
  border-radius: 20px;
  padding: 28px;
  max-width: 360px;
  width: 90%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  transform: scale(0.9);
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  text-align: center;
}
.char-card-overlay.visible .char-card {
  transform: scale(1);
}
.char-card .card-name {
  font-size: 22px;
  font-weight: 900;
  margin: 12px 0 4px;
}
.char-card .card-role {
  font-size: 13px;
  color: #64748b;
  margin-bottom: 12px;
}
.char-card .card-desc {
  font-size: 13px;
  line-height: 1.8;
  color: #475569;
  text-align: left;
}
.char-card .card-close {
  margin-top: 16px;
  background: #f1f5f9;
  border: none;
  padding: 8px 24px;
  border-radius: 8px;
  cursor: pointer;
  font-family: 'Noto Sans SC', sans-serif;
  font-weight: 500;
  font-size: 13px;
  color: #475569;
}
.char-card .card-close:hover { background: #e2e8f0; }
.card-svg-container {
  display: flex;
  justify-content: center;
}

/* Thought bubble (multi-line code style) */
.thought-bubble {
  position: absolute;
  background: #fffbeb;
  border: 2px solid #fde68a;
  border-radius: 14px;
  padding: 10px 14px;
  font-size: 11px;
  line-height: 1.7;
  max-width: 220px;
  opacity: 0;
  transform: scale(0);
  transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s;
  z-index: 10;
  font-family: 'Courier New', monospace;
}
.thought-bubble.visible {
  opacity: 1;
  transform: scale(1);
}
.thought-bubble::before {
  content: '💡';
  position: absolute;
  top: -12px;
  left: 10px;
  font-size: 16px;
}

/* Memory search vis */
.memory-search {
  position: absolute;
  background: #f5f3ff;
  border: 2px solid #c4b5fd;
  border-radius: 14px;
  padding: 10px 14px;
  font-size: 11px;
  line-height: 1.7;
  max-width: 240px;
  opacity: 0;
  transition: opacity 0.5s;
  z-index: 10;
}
.memory-search.visible { opacity: 1; }
.search-tag {
  display: inline-block;
  background: #7c3aed;
  color: white;
  font-size: 9px;
  padding: 1px 6px;
  border-radius: 4px;
  margin-right: 4px;
  font-weight: 700;
}

/* Scroll item */
.scroll-item {
  position: absolute;
  background: #fefce8;
  border: 2px solid #fde68a;
  border-radius: 8px;
  padding: 6px 12px;
  font-size: 11px;
  opacity: 0;
  transition: opacity 0.4s;
  z-index: 10;
  white-space: nowrap;
}
.scroll-item.visible { opacity: 1; }

/* Thumbs up */
.thumbs-up {
  position: absolute;
  font-size: 28px;
  opacity: 0;
  transition: opacity 0.4s, transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  transform: scale(0);
  z-index: 10;
}
.thumbs-up.visible {
  opacity: 1;
  transform: scale(1);
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>OpenClaw 五大组件如何协作？</h1>
    <p class="subtitle">看五个小伙伴如何处理一条消息</p>
  </div>

  <div class="progress-section">
    <div class="phase-labels" id="phaseLabels">
      <span class="phase-label active" data-phase="0">准备</span>
      <span class="phase-label" data-phase="1">消息到达</span>
      <span class="phase-label" data-phase="2">大脑接管</span>
      <span class="phase-label" data-phase="3">查询记忆</span>
      <span class="phase-label" data-phase="4">调用工具</span>
      <span class="phase-label" data-phase="5">心跳监控</span>
      <span class="phase-label" data-phase="6">返回结果</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <div class="stage-wrapper">
    <div class="stage" id="stage">
      <!-- SVG flow paths -->
      <svg class="flow-path" id="flowPaths">
        <defs>
          <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
            <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
      </svg>

      <!-- Characters will be placed by JS -->
      <!-- Overlays (bubbles, orbs, etc.) will be managed by JS -->
    </div>
  </div>

  <div class="phase-desc" id="phaseDesc">
    <span class="phase-num">准备就绪</span>
    <div class="phase-title">五位小伙伴已就位</div>
    <div class="phase-text">点击"自动播放"或"下一步"开始观看 OpenClaw 如何处理一条用户消息</div>
  </div>

  <div class="controls">
    <button class="btn btn-secondary" id="btnReplay"><span class="btn-icon">↺</span> 重播</button>
    <button class="btn btn-secondary" id="btnPrev"><span class="btn-icon">←</span> 上一步</button>
    <button class="btn btn-primary" id="btnNext">下一步 <span class="btn-icon">→</span></button>
    <button class="btn btn-success" id="btnAuto"><span class="btn-icon">▶</span> 自动播放</button>
  </div>
</div>

<!-- Character Detail Card Overlay -->
<div class="char-card-overlay" id="charCardOverlay">
  <div class="char-card">
    <div class="card-svg-container" id="cardSvg"></div>
    <div class="card-name" id="cardName"></div>
    <div class="card-role" id="cardRole"></div>
    <div class="card-desc" id="cardDesc"></div>
    <button class="card-close" onclick="closeCard()">关闭</button>
  </div>
</div>

<script>
// ─── Character Definitions ───
const characters = [
  {
    id: 'gateway',
    name: 'Gateway',
    cnName: '网关小哥',
    color: '#10b981',
    lightColor: '#d1fae5',
    role: '接收和路由消息',
    desc: 'Gateway 是 OpenClaw 的"前台接待"。它负责接收来自各个渠道（Slack、微信、API）的消息，进行初步处理后分配会话 ID，并放入 Lane Queue 排队。它还负责将最终结果发送回用户所在的渠道。',
    x: 80
  },
  {
    id: 'brain',
    name: 'Brain',
    cnName: '大脑博士',
    color: '#2563eb',
    lightColor: '#dbeafe',
    role: '思考和编排任务',
    desc: 'Brain 是 OpenClaw 的"总指挥"。它分析用户意图，决定需要哪些工具和记忆，构建上下文发送给 LLM，并协调其他组件完成任务。每个 Lane 都有一个独立的 Brain 实例在运行。',
    x: 270
  },
  {
    id: 'memory',
    name: 'Memory',
    cnName: '记忆管理员',
    color: '#7c3aed',
    lightColor: '#ede9fe',
    role: '存储和检索信息',
    desc: 'Memory 是 OpenClaw 的"图书管理员"。它使用 BM25 关键词搜索和向量语义搜索两种方式检索历史信息，确保 Brain 可以获取相关的上下文记忆，让对话更加连贯。',
    x: 460
  },
  {
    id: 'skills',
    name: 'Skills',
    cnName: '工具达人',
    color: '#f59e0b',
    lightColor: '#fef3c7',
    role: '执行工具调用',
    desc: 'Skills 是 OpenClaw 的"万能技工"。它管理所有可用工具（Grep、HTTP、数据库查询等），接收 Brain 的调用请求，执行具体操作，并将结果返回。每个工具都有权限控制和超时保护。',
    x: 650
  },
  {
    id: 'heartbeat',
    name: 'Heartbeat',
    cnName: '心跳值班员',
    color: '#ef4444',
    lightColor: '#fee2e2',
    role: '监控和调度',
    desc: 'Heartbeat 是 OpenClaw 的"安全员"。它持续监控所有会话的健康状态，记录 Token 用量、响应时间等指标，检测异常并触发告警。它还负责定时任务（Cron）的调度。',
    x: 840
  }
];

// Character positions (center x of each character on stage)
const charPositions = characters.map(c => ({ x: c.x, y: 280 }));

// ─── SVG Character Generators ───
function createGatewaySVG(scale) {
  const s = scale || 1;
  return `<svg width="${80*s}" height="${100*s}" viewBox="0 0 80 100" fill="none">
    <!-- Glow -->
    <circle class="char-glow" cx="40" cy="50" r="48" fill="#10b981" opacity="0"/>
    <!-- Body -->
    <rect x="20" y="45" width="40" height="38" rx="12" fill="#10b981"/>
    <rect x="24" y="49" width="32" height="30" rx="8" fill="#059669"/>
    <!-- Head -->
    <circle cx="40" cy="30" r="18" fill="#10b981"/>
    <circle cx="40" cy="30" r="14" fill="#d1fae5"/>
    <!-- Eyes -->
    <circle cx="34" cy="28" r="2.5" fill="#065f46"/>
    <circle cx="46" cy="28" r="2.5" fill="#065f46"/>
    <!-- Smile -->
    <path d="M35 34 Q40 38 45 34" stroke="#065f46" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Headset -->
    <path d="M22 24 Q22 14 40 14 Q58 14 58 24" stroke="#065f46" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <rect x="17" y="22" width="8" height="10" rx="3" fill="#065f46"/>
    <rect x="55" y="22" width="8" height="10" rx="3" fill="#065f46"/>
    <circle cx="21" cy="27" r="2" fill="#34d399"/>
    <!-- Clipboard -->
    <rect x="54" y="52" width="16" height="20" rx="3" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>

const stage = document.getElementById('stage');

function initStage() {
  // Place characters
  characters.forEach((c, i) => {
    const div = document.createElement('div');

    div.innerHTML = `
      <div class="char-body-${i}">

    `;
    div.addEventListener('click', () => showCharCard(i));
    stage.appendChild(div);
  });
}

// ─── Overlay Management ───
function addOverlay(html, id) {
  const el = document.createElement('div');
  el.innerHTML = html;
  const child = el.firstElementChild;
  if (id) child.id = id;
  stage.appendChild(child);
  overlays.push(child);
  return child;
}

function clearOverlays() {
  overlays.forEach(el => {
    if (el.parentNode) el.parentNode.removeChild(el);
  });
  overlays.length = 0;
  // Reset character highlights
  document.querySelectorAll('.character').forEach(c => c.classList.remove('active-char'));
}

function highlightChar(index) {
  document.getElementById(`char-${characters[index].id}`).classList.add('active-char');
}

// ─── Animated Orb Between Characters ───
function animateOrb(fromIdx, toIdx, color, duration) {
  return new Promise(resolve => {
    const orb = addOverlay(`<div class="orb visible" style="background:${color}; color:${color};"></div>`);
    const fx = characters[fromIdx].x;
    const fy = 250;
    const tx = characters[toIdx].x;
    const ty = 250;
    orb.style.left = fx + 'px';
    orb.style.top = fy + 'px';
    const start = performance.now();
    function tick(now) {
      const t = Math.min((now - start) / duration, 1);
      const ease = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
      orb.style.left = (fx + (tx - fx) * ease - 10) + 'px';
      orb.style.top = (fy + Math.sin(t * Math.PI) * -40 - 10) + 'px';
      if (t < 1) requestAnimationFrame(tick);
      else resolve();
    }
    requestAnimationFrame(tick);
  });
}

// ─── Draw Dotted Path ───
function drawDottedPath(fromIdx, toIdx, color) {
  const svg = document.getElementById('flowPaths');
  const fx = characters[fromIdx].x;
  const fy = 260;
  const tx = characters[toIdx].x;
  const ty = 260;
  const mx = (fx + tx) / 2;
  const my = fy - 50;
  const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  path.setAttribute('d', `M${fx},${fy} Q${mx},${my} ${tx},${ty}`);
  path.setAttribute('stroke', color);
  path.setAttribute('stroke-width', '2');
  path.setAttribute('stroke-dasharray', '6,4');
  path.setAttribute('fill', 'none');
  path.setAttribute('opacity', '0.4');
  svg.appendChild(path);
  overlays.push(path);
}

  document.getElementById('progressFill').style.width = pct + '%';
  document.querySelectorAll('.phase-label').forEach((el, i) => {

  clearOverlays();
  currentPhase = phase;
  updatePhaseDesc();
  updateProgress();
  updateButtons();

  if (phase === 0) return;
  if (phase >= 1) await showPhase1();
  if (phase >= 2) await showPhase2();
  if (phase >= 3) await showPhase3();
  if (phase >= 4) await showPhase4();
  if (phase >= 5) await showPhase5();
  if (phase >= 6) await showPhase6();
}

  await wait(200);
  terminal.classList.add('visible');

  await wait(600);

  // Update terminal with results
  terminal.innerHTML = `
    <div class="cmd">$ grep -r "TODO" src/</div>
    <div style="color:#94a3b8;">src/auth.ts:23:  // TODO: 添加权限校验</div>
    <div style="color:#94a3b8;">src/api.ts:45:   // TODO: 错误处理</div>
    <div style="color:#94a3b8;">... 共 23 个匹配</div>
    <div class="result" style="margin-top:4px;">✓ 找到 23 个 TODO，分布在 8 个文件中</div>
  `;

  await animateOrb(3, 1, '#f59e0b', 700);
}

async function showPhase5() {
  highlightChar(4);

  // Monitor stats
  const stats = addOverlay(`
    <div class="monitor-stats" style="top:80px; left:${characters[4].x - 40}px;">
      <div style="font-weight:700; color:#ef4444; margin-bottom:4px;">实时监控</div>
      <div class="stat-row"><span class="stat-dot green"></span> 会话时长: 2.3s</div>
      <div class="stat-row"><span class="stat-dot blue"></span> Token: 1,247</div>
      <div class="stat-row"><span class="stat-dot yellow"></span> 工具调用: 1 次</div>
      <div class="stat-row"><span class="stat-dot green"></span> 状态: <b style="color:#10b981;">正常</b></div>
    </div>
  `);
  await wait(200);
  stats.classList.add('visible');

  // Thumbs up
  const thumbs = addOverlay(`
    <div class="thumbs-up" style="top:190px; left:${characters[4].x}px;">👍</div>
  `);
  await wait(400);
  thumbs.classList.add('visible');
}

async function showPhase6() {
  highlightChar(0);
  highlightChar(1);
  drawDottedPath(1, 0, '#2563eb');

  // Brain passes result to Gateway
  await animateOrb(1, 0, '#10b981', 800);

  // Response message
  const resp = addOverlay(`
    <div class="chat-msg response" style="top:60px; left:${characters[0].x - 80}px; max-width:280px;">
      找到 23 个 TODO 注释，其中 5 个标记为高优先级。详情已整理为列表，按文件分组展示。
      <span class="msg-source">发送至: Slack #dev-team</span>
    </div>
  `);
  await wait(200);
  resp.classList.add('visible');

  await wait(400);

  // Celebration - all characters jump
  characters.forEach((c, i) => {
    const charEl = document.getElementById(`char-${c.id}`);
    const body = charEl.querySelector(`.char-body-${i}`);
    body.style.animation = 'none';
    body.offsetHeight; // reflow
    body.style.animation = `celebrate 0.6s ease-out ${i * 0.1}s`;
    setTimeout(() => {
      body.style.animation = `idleBounce${i} 2s ease-in-out infinite ${i * 0.4}s`;
    }, 800 + i * 100);
  });

  // Summary bar
  const summary = addOverlay(`
    <div class="summary-bar">
      完整流程: 📨 消息到达 → 🧠 大脑分析 → 📚 检索记忆 → 🔧 调用工具 → 💓 监控状态 → ✅ 返回结果 | 总耗时 2.3s
    </div>
  `);
  await wait(300);
  summary.classList.add('visible');
}

// ─── Direct Phase Display (no incremental) ───
async function goToPhase(phase) {
  if (phase < 0) phase = 0;
  if (phase > 6) phase = 6;
  clearOverlays();
  currentPhase = phase;
  updatePhaseDesc();
  updateProgress();
  updateButtons();

  // Replay all phases up to current
  if (phase >= 1) await showPhase1();
  if (phase >= 2) await showPhase2();
  if (phase >= 3) await showPhase3();
  if (phase >= 4) await showPhase4();
  if (phase >= 5) await showPhase5();
  if (phase >= 6) await showPhase6();
}

// ─── Controls ───
document.getElementById('btnNext').addEventListener('click', () => {
  if (currentPhase < 6) {
    stopAutoPlay();
    goToPhase(currentPhase + 1);
  }
});

document.getElementById('btnPrev').addEventListener('click', () => {
  if (currentPhase > 0) {
    stopAutoPlay();
    goToPhase(currentPhase - 1);
  }
});

document.getElementById('btnReplay').addEventListener('click', () => {
  stopAutoPlay();
  goToPhase(0);
});

document.getElementById('btnAuto').addEventListener('click', () => {
  if (isAutoPlaying) {
    stopAutoPlay();
  } else {
    startAutoPlay();
  }
});

function startAutoPlay() {
  isAutoPlaying = true;
  const btn = document.getElementById('btnAuto');
  btn.innerHTML = '<span class="btn-icon">⏸</span> 暂停';
  btn.classList.remove('btn-success');
  btn.classList.add('btn-secondary');

  // If at end, restart
  if (currentPhase >= 6) {
    goToPhase(0);
  }

  autoPlayTick();
}

function autoPlayTick() {
  if (!isAutoPlaying) return;
  if (currentPhase >= 6) {
    stopAutoPlay();
    return;
  }
  autoPlayTimer = setTimeout(async () => {
    if (!isAutoPlaying) return;
    await goToPhase(currentPhase + 1);
    autoPlayTick();
  }, 3000);
}

function stopAutoPlay() {
  isAutoPlaying = false;
  if (autoPlayTimer) clearTimeout(autoPlayTimer);
  autoPlayTimer = null;
  const btn = document.getElementById('btnAuto');
  btn.innerHTML = '<span class="btn-icon">▶</span> 自动播放';
  btn.classList.remove('btn-secondary');
  btn.classList.add('btn-success');
}

// Phase label click
document.querySelectorAll('.phase-label').forEach(el => {
  el.addEventListener('click', () => {
    const phase = parseInt(el.dataset.phase);
    stopAutoPlay();
    goToPhase(phase);
  });
});

// ─── Character Card ───
function showCharCard(index) {
  const c = characters[index];
  document.getElementById('cardSvg').innerHTML = charSVGs[index](1.5);
  document.getElementById('cardName').innerHTML = `${c.name} <span style="color:${c.color};">(${c.cnName})</span>`;
  document.getElementById('cardName').style.color = c.color;
  document.getElementById('cardRole').textContent = c.role;
  document.getElementById('cardDesc').textContent = c.desc;
  document.getElementById('charCardOverlay').classList.add('visible');
}

function closeCard() {
  document.getElementById('charCardOverlay').classList.remove('visible');
}

document.getElementById('charCardOverlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('charCardOverlay')) closeCard();
});

// ─── Keyboard Navigation ───
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') {
    e.preventDefault();
    if (currentPhase < 6) {
      stopAutoPlay();
      goToPhase(currentPhase + 1);
    }
  } else if (e.key === 'ArrowLeft') {
    e.preventDefault();
    if (currentPhase > 0) {
      stopAutoPlay();
      goToPhase(currentPhase - 1);
    }
  } else if (e.key === 'Escape') {
    closeCard();
  }
});

// ─── Init ───
initStage();
updatePhaseDesc();
updateProgress();
updateButtons();
</script>
