<header>AI 全栈培训</header>

<h1 id="%E7%AC%AC%E4%B8%89%E9%83%A8%E5%88%86%E6%89%8B%E6%8A%8A%E6%89%8B%E8%B0%83%E7%94%A8%E5%A4%A7%E6%A8%A1%E5%9E%8B">第三部分：手把手调用大模型</h1>
<h2 id="%E8%B0%83%E7%94%A8%E5%A4%A7%E6%A8%A1%E5%9E%8B--api-%E4%B8%8E%E5%8F%82%E6%95%B0">调用大模型 — API 与参数</h2>
<p>15 页 / 40 分钟（全程动手）</p>
<footer>第三部分：API 与参数</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="2" data-paginate="true" data-header="AI 全栈培训" data-footer="第三部分：API 与参数" data-theme="oyqjhy2jci8rrucl5kfxrgyvchpg92ob5b6nxa3sut" lang="zh-CN" data-marpit-pagination="2" style="--paginate:true;--header:AI 全栈培训;--footer:第三部分：API 与参数;--theme:oyqjhy2jci8rrucl5kfxrgyvchpg92ob5b6nxa3sut;" data-marpit-pagination-total="15">
<header>AI 全栈培训</header>
<h1 id="api-%E6%98%AF%E4%BB%80%E4%B9%88">API 是什么？</h1>
<div class="columns">
<div class="col">
<h3 id="%E9%A4%90%E5%8E%85%E7%82%B9%E9%A4%90%E6%B5%81%E7%A8%8B">餐厅点餐流程</h3>
<ol>
<li><strong>顾客</strong> 看菜单、告诉服务员要什么菜</li>
<li><strong>厨房</strong> 收到订单、开始做菜</li>
<li><strong>服务员</strong> 把做好的菜端上桌</li>
</ol>
<p>你每天都在用 API —— 前端和后端之间的通信，就是 API 调用。</p>
</div>
<div class="col">
<h3 id="%E5%A4%A7%E6%A8%A1%E5%9E%8B-api-%E6%B5%81%E7%A8%8B">大模型 API 流程</h3>
<ol>
<li><strong>你的代码</strong> 发送提示词（prompt）</li>
<li><strong>大模型服务器</strong> 处理请求</li>
<li><strong>大模型</strong> 返回生成的文本</li>
</ol>
</div>
</div>
<div class="callout-blue">
<p><strong>核心类比：</strong> 餐厅点餐 = API 请求/响应。顾客（客户端）下单、厨房（服务器）处理、上菜（返回结果），流程完全一致。区别只是：一个传菜单，一个传自然语言。</p>
</div>
<footer>第三部分：API 与参数</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="3" data-paginate="true" data-header="AI 全栈培训" data-footer="第三部分：API 与参数" data-theme="oyqjhy2jci8rrucl5kfxrgyvchpg92ob5b6nxa3sut" lang="zh-CN" data-marpit-pagination="3" style="--paginate:true;--header:AI 全栈培训;--footer:第三部分：API 与参数;--theme:oyqjhy2jci8rrucl5kfxrgyvchpg92ob5b6nxa3sut;" data-marpit-pagination-total="15">
<header>AI 全栈培训</header>
<h1 id="%E5%A4%A7%E6%A8%A1%E5%9E%8B-api-%E7%9A%84%E5%9F%BA%E6%9C%AC%E7%BB%93%E6%9E%84">大模型 API 的基本结构</h1>
<p>所有大模型 API 都遵循相同的三层结构：</p>
<h3 id="1-endpoint%E5%9C%B0%E5%9D%80-%E4%BD%A0%E8%A6%81%E6%95%B2%E5%93%AA%E6%89%87%E9%97%A8">1. Endpoint（地址）—— 你要敲哪扇门</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>POST https://api.openai.com/v1/chat/completions
</code></pre>
<h3 id="2-headers%E8%AF%B7%E6%B1%82%E5%A4%B4-%E4%BD%A0%E7%9A%84%E8%BA%AB%E4%BB%BD%E8%AF%81%E6%98%8E">2. Headers（请求头）—— 你的身份证明</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>Authorization: Bearer sk-xxxxx      # API 密钥
Content-Type: application/json       # 数据格式
</code></pre>
<h3 id="3-body%E8%AF%B7%E6%B1%82%E4%BD%93-%E4%BD%A0%E8%A6%81%E8%AF%B4%E7%9A%84%E8%AF%9D--%E5%8F%82%E6%95%B0">3. Body（请求体）—— 你要说的话 + 参数</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-json"><span class="hljs-punctuation">{</span>
  <span class="hljs-attr">&quot;model&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;gpt-4o&quot;</span><span class="hljs-punctuation">,</span>                          <span class="hljs-comment">// 选哪个模型</span>
  <span class="hljs-attr">&quot;messages&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">[</span><span class="hljs-punctuation">{</span><span class="hljs-attr">&quot;role&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;user&quot;</span><span class="hljs-punctuation">,</span> <span class="hljs-attr">&quot;content&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;你好&quot;</span><span class="hljs-punctuation">}</span><span class="hljs-punctuation">]</span><span class="hljs-punctuation">,</span>  <span class="hljs-comment">// 对话内容</span>
  <span class="hljs-attr">&quot;temperature&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-number">0.7</span>                           <span class="hljs-comment">// 参数调节</span>
<span class="hljs-punctuation">}</span>
</code></pre>
<blockquote>
<p>记住这三层结构，所有大模型 API 都是这个套路，区别只在细节。</p>
</blockquote>
<footer>第三部分：API 与参数</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="4" data-paginate="true" data-header="AI 全栈培训" data-footer="第三部分：API 与参数" data-theme="oyqjhy2jci8rrucl5kfxrgyvchpg92ob5b6nxa3sut" lang="zh-CN" data-marpit-pagination="4" style="--paginate:true;--header:AI 全栈培训;--footer:第三部分：API 与参数;--theme:oyqjhy2jci8rrucl5kfxrgyvchpg92ob5b6nxa3sut;" data-marpit-pagination-total="15">
<header>AI 全栈培训</header>
<h1 id="%E8%AE%A4%E8%AF%81%E4%B8%8E%E5%AF%86%E9%92%A5">认证与密钥</h1>
<h3 id="api-key--%E4%BD%A0%E7%9A%84%E8%BA%AB%E4%BB%BD%E8%AF%81--%E9%92%B1%E5%8C%85">API Key = 你的身份证 + 钱包</h3>
<ul>
<li>它证明你是谁（认证）</li>
<li>它决定你能花多少钱（计费）</li>
<li>它泄露了别人就能花你的钱</li>
</ul>
<h3 id="%E6%AD%A3%E7%A1%AE%E5%81%9A%E6%B3%95%E4%BD%BF%E7%94%A8%E7%8E%AF%E5%A2%83%E5%8F%98%E9%87%8F">正确做法：使用环境变量</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># 在终端设置（不写进代码）</span>
<span class="hljs-built_in">export</span> OPENAI_API_KEY=<span class="hljs-string">&quot;sk-proj-xxxxxxxxxxxxxxxx&quot;</span>
<span class="hljs-built_in">export</span> ANTHROPIC_API_KEY=<span class="hljs-string">&quot;sk-ant-xxxxxxxxxxxxxxxx&quot;</span>
<span class="hljs-built_in">export</span> GOOGLE_API_KEY=<span class="hljs-string">&quot;AIzaXXXXXXXXXXXXXXXX&quot;</span>
</code></pre>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># 在代码中读取</span>
<span class="hljs-keyword">import</span> os
api_key = os.environ[<span class="hljs-string">&quot;OPENAI_API_KEY&quot;</span>]
</code></pre>
<div class="callout">
<p><strong>安全铁律：</strong> 永远不要把 API Key 写进代码、提交到 Git、发到群聊里。一旦泄露，立即到官网轮换密钥。</p>
</div>
<footer>第三部分：API 与参数</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" data-paginate="true" data-header="AI 全栈培训" data-footer="第三部分：API 与参数" data-class="highlight" data-theme="oyqjhy2jci8rrucl5kfxrgyvchpg92ob5b6nxa3sut" lang="zh-CN" class="highlight" data-marpit-pagination="5" style="--paginate:true;--header:AI 全栈培训;--footer:第三部分：API 与参数;--class:highlight;--theme:oyqjhy2jci8rrucl5kfxrgyvchpg92ob5b6nxa3sut;" data-marpit-pagination-total="15">
<header>AI 全栈培训</header>

<h1 id="temperature--%E5%88%9B%E9%80%A0%E5%8A%9B%E6%97%8B%E9%92%AE">temperature — 创造力旋钮</h1>
<p><strong>temperature</strong> 控制模型输出的随机性，范围 <strong>0.0 ~ 2.0</strong></p>
<div class="columns">
<div class="col">
<h3 id="%E4%B8%8D%E5%90%8C%E6%B8%A9%E5%BA%A6%E7%9A%84%E6%95%88%E6%9E%9C">不同温度的效果</h3>
<table>
<thead>
<tr>
<th style="text-align:center">temperature</th>
<th>表现</th>
<th>类比</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:center"><strong>0.0</strong></td>
<td>确定性输出，每次一样</td>
<td>计算器：1+1 永远等于 2</td>
</tr>
<tr>
<td style="text-align:center"><strong>0.3</strong></td>
<td>略有变化，整体稳定</td>
<td>老师傅做菜：味道稳定</td>
</tr>
<tr>
<td style="text-align:center"><strong>0.7</strong></td>
<td>适度创意，常用默认值</td>
<td>即兴演讲：有框架有发挥</td>
</tr>
<tr>
<td style="text-align:center"><strong>1.0</strong></td>
<td>高度创意，变化较大</td>
<td>头脑风暴：天马行空</td>
</tr>
<tr>
<td style="text-align:center"><strong>&gt;1.5</strong></td>
<td>混乱，可能胡言乱语</td>
<td>喝多了说胡话</td>
</tr>
</tbody>
</table>
</div>
<div class="col">
<h3 id="%E5%9C%BA%E6%99%AF%E6%8E%A8%E8%8D%90">场景推荐</h3>
<ul>
<li><strong>代码生成</strong> → <code>0.0 ~ 0.2</code><br />
确定性最重要，不要&quot;创意&quot;代码</li>
<li><strong>数据提取 / 分类</strong> → <code>0.0</code><br />
要准确，不要变化</li>
<li><strong>客服回复</strong> → <code>0.3 ~ 0.5</code><br />
稳定但不死板</li>
<li><strong>创意写作</strong> → <code>0.7 ~ 1.0</code><br />
需要多样性和新意</li>
<li><strong>头脑风暴</strong> → <code>1.0 ~ 1.5</code><br />
越发散越好</li>
</ul>
</div>
</div>
<blockquote>
<p><strong>同一个 prompt，temperature=0 和 temperature=1.5 的输出可能完全不同。</strong></p>
</blockquote>
<footer>第三部分：API 与参数</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" data-paginate="true" data-header="AI 全栈培训" data-footer="第三部分：API 与参数" data-theme="oyqjhy2jci8rrucl5kfxrgyvchpg92ob5b6nxa3sut" lang="zh-CN" data-marpit-pagination="6" style="--paginate:true;--header:AI 全栈培训;--footer:第三部分：API 与参数;--theme:oyqjhy2jci8rrucl5kfxrgyvchpg92ob5b6nxa3sut;" data-marpit-pagination-total="15">
<header>AI 全栈培训</header>
<h1 id="top_p--%E6%A0%B8%E9%87%87%E6%A0%B7">top_p — 核采样</h1>
<h3 id="%E4%BB%80%E4%B9%88%E6%98%AF%E6%A0%B8%E9%87%87%E6%A0%B7nucleus-sampling">什么是核采样（Nucleus Sampling）？</h3>
<p>模型预测下一个词时，会给所有候选词打分（概率）。<strong>top_p</strong> 决定从概率排名前多少的词里选。</p>
<h3 id="%E7%B1%BB%E6%AF%94%E7%82%B9%E8%8F%9C%E7%AD%96%E7%95%A5">类比：点菜策略</h3>
<table>
<thead>
<tr>
<th style="text-align:center">top_p</th>
<th>做法</th>
<th>类比</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:center"><strong>0.1</strong></td>
<td>只从概率前 10% 的词里选</td>
<td>只看菜单前 3 道招牌菜</td>
</tr>
<tr>
<td style="text-align:center"><strong>0.5</strong></td>
<td>从概率前 50% 的词里选</td>
<td>看半页菜单，选熟悉的</td>
</tr>
<tr>
<td style="text-align:center"><strong>0.9</strong></td>
<td>从概率前 90% 的词里选</td>
<td>几乎整个菜单都考虑</td>
</tr>
<tr>
<td style="text-align:center"><strong>1.0</strong></td>
<td>所有词都有机会被选</td>
<td>连隐藏菜单都看，什么都可能点</td>
</tr>
</tbody>
</table>
<div class="callout-blue">
<p><strong>重要原则：temperature 和 top_p 一般只调一个，不要同时调。</strong></p>
<ul>
<li>想要更确定的输出 → 降低 temperature（保持 top_p=1.0）</li>
<li>想要更聚焦的输出 → 降低 top_p（保持 temperature=1.0）</li>
</ul>
</div>
<footer>第三部分：API 与参数</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" data-paginate="true" data-header="AI 全栈培训" data-footer="第三部分：API 与参数" data-theme="oyqjhy2jci8rrucl5kfxrgyvchpg92ob5b6nxa3sut" lang="zh-CN" data-marpit-pagination="7" style="--paginate:true;--header:AI 全栈培训;--footer:第三部分：API 与参数;--theme:oyqjhy2jci8rrucl5kfxrgyvchpg92ob5b6nxa3sut;" data-marpit-pagination-total="15">
<header>AI 全栈培训</header>
<h1 id="top_k--%E5%80%99%E9%80%89%E8%AF%8D%E6%95%B0%E9%87%8F">top_k — 候选词数量</h1>
<h3 id="%E6%AF%94-top_p-%E6%9B%B4%E7%AE%80%E5%8D%95%E7%B2%97%E6%9A%B4%E7%9A%84%E7%AD%9B%E9%80%89">比 top_p 更简单粗暴的筛选</h3>
<p><strong>top_k</strong> 直接限定：只从概率最高的前 K 个词里选。</p>
<table>
<thead>
<tr>
<th style="text-align:center">top_k</th>
<th>效果</th>
<th>类比</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:center"><strong>1</strong></td>
<td>永远选概率最高的词（贪心）</td>
<td>永远点最畅销的菜</td>
</tr>
<tr>
<td style="text-align:center"><strong>10</strong></td>
<td>从前 10 个候选词里随机选</td>
<td>从 Top 10 热门菜里选</td>
</tr>
<tr>
<td style="text-align:center"><strong>50</strong></td>
<td>从前 50 个候选词里随机选</td>
<td>有足够多的选择空间</td>
</tr>
<tr>
<td style="text-align:center"><strong>100+</strong></td>
<td>候选词很多，接近不筛选</td>
<td>几乎随便点</td>
</tr>
</tbody>
</table>
<h3 id="%E6%B3%A8%E6%84%8F%E4%B8%8D%E6%98%AF%E6%89%80%E6%9C%89-api-%E9%83%BD%E6%94%AF%E6%8C%81">注意：不是所有 API 都支持</h3>
<table>
<thead>
<tr>
<th>模型</th>
<th style="text-align:center">是否支持 top_k</th>
</tr>
</thead>
<tbody>
<tr>
<td>GPT 系列（OpenAI）</td>
<td style="text-align:center">不支持</td>
</tr>
<tr>
<td>Claude 系列（Anthropic）</td>
<td style="text-align:center">支持</td>
</tr>
<tr>
<td>Gemini 系列（Google）</td>
<td style="text-align:center">支持</td>
</tr>
</tbody>
</table>
<blockquote>
<p><strong>top_k vs top_p：</strong> top_k 按数量截断，top_p 按概率截断。top_p 更灵活，是目前主流做法。</p>
</blockquote>
<footer>第三部分：API 与参数</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" data-paginate="true" data-header="AI 全栈培训" data-footer="第三部分：API 与参数" data-theme="oyqjhy2jci8rrucl5kfxrgyvchpg92ob5b6nxa3sut" lang="zh-CN" data-marpit-pagination="8" style="--paginate:true;--header:AI 全栈培训;--footer:第三部分：API 与参数;--theme:oyqjhy2jci8rrucl5kfxrgyvchpg92ob5b6nxa3sut;" data-marpit-pagination-total="15">
<header>AI 全栈培训</header>
<h1 id="max_tokens--%E5%9B%9E%E7%AD%94%E9%95%BF%E5%BA%A6%E4%B8%8A%E9%99%90">max_tokens — 回答长度上限</h1>
<h3 id="token-%E6%98%AF%E4%BB%80%E4%B9%88">Token 是什么？</h3>
<p>Token 是大模型处理文本的最小单位，不是字也不是词，而是介于两者之间的&quot;片段&quot;。</p>
<table>
<thead>
<tr>
<th>内容</th>
<th style="text-align:center">大约 Token 数</th>
<th>说明</th>
</tr>
</thead>
<tbody>
<tr>
<td>1 个中文字</td>
<td style="text-align:center"><strong>1 ~ 2</strong> tokens</td>
<td>&quot;你好&quot; ≈ 2 tokens</td>
</tr>
<tr>
<td>1 个英文单词</td>
<td style="text-align:center"><strong>≈ 1</strong> token</td>
<td>&quot;hello&quot; = 1 token</td>
</tr>
<tr>
<td>一段代码（100 行）</td>
<td style="text-align:center"><strong>300 ~ 800</strong> tokens</td>
<td>视代码复杂度而定</td>
</tr>
<tr>
<td>一篇文章（1000 字）</td>
<td style="text-align:center"><strong>1000 ~ 2000</strong> tokens</td>
<td>中文消耗更多 token</td>
</tr>
</tbody>
</table>
<h3 id="%E5%85%B3%E9%94%AE%E7%BA%A6%E6%9D%9F">关键约束</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>输入 tokens + 输出 tokens ≤ 模型上下文窗口
</code></pre>
<ul>
<li>GPT-4o：128K 上下文，最大输出 16K tokens</li>
<li>Claude Sonnet：200K 上下文，最大输出 8K tokens</li>
<li>设置 <code>max_tokens</code> = 你愿意为一次回复付费的上限</li>
</ul>
<div class="callout">
<p><strong>成本公式：</strong> 费用 = (输入 tokens x 输入单价) + (输出 tokens x 输出单价)。输出通常比输入贵 2~4 倍，所以 max_tokens 直接影响你的账单。</p>
</div>
<footer>第三部分：API 与参数</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" data-paginate="true" data-header="AI 全栈培训" data-footer="第三部分：API 与参数" data-theme="oyqjhy2jci8rrucl5kfxrgyvchpg92ob5b6nxa3sut" lang="zh-CN" data-marpit-pagination="9" style="--paginate:true;--header:AI 全栈培训;--footer:第三部分：API 与参数;--theme:oyqjhy2jci8rrucl5kfxrgyvchpg92ob5b6nxa3sut;" data-marpit-pagination-total="15">
<header>AI 全栈培训</header>
<h1 id="%E5%85%B6%E4%BB%96%E9%87%8D%E8%A6%81%E5%8F%82%E6%95%B0">其他重要参数</h1>
<table>
<thead>
<tr>
<th>参数</th>
<th>作用</th>
<th>值域</th>
<th>什么时候用</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>frequency_penalty</strong></td>
<td>降低已出现词的重复概率</td>
<td>-2.0 ~ 2.0</td>
<td>模型一直重复同样的话时，调到 0.5~1.0</td>
</tr>
<tr>
<td><strong>presence_penalty</strong></td>
<td>鼓励模型提到新话题</td>
<td>-2.0 ~ 2.0</td>
<td>希望回答更丰富多样时，调到 0.5~1.0</td>
</tr>
<tr>
<td><strong>stop</strong></td>
<td>遇到指定字符串就停止生成</td>
<td>字符串数组</td>
<td>需要精确控制输出结尾时，如 <code>[&quot;\n\n&quot;, &quot;END&quot;]</code></td>
</tr>
<tr>
<td><strong>seed</strong></td>
<td>固定随机种子（尽量可复现）</td>
<td>整数</td>
<td>调试时想复现同样的输出</td>
</tr>
</tbody>
</table>
<h3 id="%E5%AE%9E%E9%99%85%E4%BD%BF%E7%94%A8%E5%BB%BA%E8%AE%AE">实际使用建议</h3>
<ul>
<li><strong>大部分场景</strong>：默认值就好，不用动</li>
<li><strong>模型输出太啰嗦</strong>：提高 <code>frequency_penalty</code> 到 0.5</li>
<li><strong>模型总是重复</strong>：提高 <code>presence_penalty</code> 到 0.6</li>
<li><strong>需要可复现的结果</strong>：设 <code>seed</code> + <code>temperature=0</code></li>
</ul>
<blockquote>
<p>这些参数是&quot;微调旋钮&quot;，先用好 temperature 和 top_p，再考虑这些。</p>
</blockquote>
<footer>第三部分：API 与参数</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" data-paginate="true" data-header="AI 全栈培训" data-footer="第三部分：API 与参数" data-class="highlight" data-theme="oyqjhy2jci8rrucl5kfxrgyvchpg92ob5b6nxa3sut" lang="zh-CN" class="highlight" data-marpit-pagination="10" style="--paginate:true;--header:AI 全栈培训;--footer:第三部分：API 与参数;--class:highlight;--theme:oyqjhy2jci8rrucl5kfxrgyvchpg92ob5b6nxa3sut;" data-marpit-pagination-total="15">
<header>AI 全栈培训</header>

<h1 id="%E5%8F%82%E6%95%B0%E7%BB%84%E5%90%88%E7%A7%98%E6%96%B9">参数组合秘方</h1>
<p>不同场景的推荐参数搭配（直接抄作业）：</p>
<table>
<thead>
<tr>
<th>场景</th>
<th style="text-align:center">temperature</th>
<th style="text-align:center">top_p</th>
<th style="text-align:center">max_tokens</th>
<th>其他</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>代码生成</strong></td>
<td style="text-align:center">0</td>
<td style="text-align:center">0.95</td>
<td style="text-align:center">4096</td>
<td><code>seed</code> 固定以复现</td>
</tr>
<tr>
<td><strong>代码审查</strong></td>
<td style="text-align:center">0</td>
<td style="text-align:center">0.95</td>
<td style="text-align:center">2048</td>
<td>—</td>
</tr>
<tr>
<td><strong>创意写作</strong></td>
<td style="text-align:center">0.8</td>
<td style="text-align:center">0.95</td>
<td style="text-align:center">4096</td>
<td><code>presence_penalty=0.6</code></td>
</tr>
<tr>
<td><strong>数据提取 / 分类</strong></td>
<td style="text-align:center">0</td>
<td style="text-align:center">1.0</td>
<td style="text-align:center">1024</td>
<td><code>stop</code> 控制输出格式</td>
</tr>
<tr>
<td><strong>客服回复</strong></td>
<td style="text-align:center">0.3</td>
<td style="text-align:center">0.9</td>
<td style="text-align:center">1024</td>
<td><code>frequency_penalty=0.3</code></td>
</tr>
<tr>
<td><strong>翻译</strong></td>
<td style="text-align:center">0.1</td>
<td style="text-align:center">0.95</td>
<td style="text-align:center">4096</td>
<td>—</td>
</tr>
<tr>
<td><strong>头脑风暴</strong></td>
<td style="text-align:center">1.2</td>
<td style="text-align:center">0.95</td>
<td style="text-align:center">4096</td>
<td><code>presence_penalty=1.0</code></td>
</tr>
<tr>
<td><strong>摘要总结</strong></td>
<td style="text-align:center">0.2</td>
<td style="text-align:center">0.9</td>
<td style="text-align:center">2048</td>
<td>—</td>
</tr>
</tbody>
</table>
<div class="callout-blue">
<p><strong>新手建议：</strong> 先从默认参数开始（temperature=1.0, top_p=1.0），然后根据结果微调。代码任务直接 temperature=0，创意任务调到 0.7~1.0。</p>
</div>
<footer>第三部分：API 与参数</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" data-paginate="true" data-header="AI 全栈培训" data-footer="第三部分：API 与参数" data-theme="oyqjhy2jci8rrucl5kfxrgyvchpg92ob5b6nxa3sut" lang="zh-CN" data-marpit-pagination="11" style="--paginate:true;--header:AI 全栈培训;--footer:第三部分：API 与参数;--theme:oyqjhy2jci8rrucl5kfxrgyvchpg92ob5b6nxa3sut;" data-marpit-pagination-total="15">
<header>AI 全栈培训</header>
<h1 id="gpt-api-%E6%A0%BC%E5%BC%8Fopenai">GPT API 格式（OpenAI）</h1>
<h3 id="%E8%AF%B7%E6%B1%82%E7%A4%BA%E4%BE%8B">请求示例</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">curl https://api.openai.com/v1/chat/completions \
  -H <span class="hljs-string">&quot;Authorization: Bearer <span class="hljs-variable">$OPENAI_API_KEY</span>&quot;</span> \
  -H <span class="hljs-string">&quot;Content-Type: application/json&quot;</span> \
  -d <span class="hljs-string">&#x27;{
    &quot;model&quot;: &quot;gpt-4o&quot;,
    &quot;messages&quot;: [
      {&quot;role&quot;: &quot;system&quot;, &quot;content&quot;: &quot;你是资深后端工程师&quot;},
      {&quot;role&quot;: &quot;user&quot;, &quot;content&quot;: &quot;解释RESTful API设计原则&quot;}
    ],
    &quot;temperature&quot;: 0.3
  }&#x27;</span>
</code></pre>
<h3 id="openai-%E7%89%B9%E7%82%B9">OpenAI 特点</h3>
<ul>
<li><strong>认证方式：</strong> <code>Authorization: Bearer &lt;key&gt;</code> 标准 OAuth 风格</li>
<li><strong>消息格式：</strong> <code>messages</code> 数组，包含 <code>system</code> / <code>user</code> / <code>assistant</code> 三种角色</li>
<li><strong>工具调用：</strong> <code>tools</code> + <code>function calling</code>，生态最成熟</li>
<li><strong>模型选择：</strong> <code>gpt-4o</code>（主力）、<code>gpt-4o-mini</code>（便宜快速）、<code>o3</code>（强推理）</li>
</ul>
<blockquote>
<p>OpenAI 是最早开放 API 的厂商，文档最全，社区最大，遇到问题最容易找到答案。</p>
</blockquote>
<footer>第三部分：API 与参数</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" data-paginate="true" data-header="AI 全栈培训" data-footer="第三部分：API 与参数" data-theme="oyqjhy2jci8rrucl5kfxrgyvchpg92ob5b6nxa3sut" lang="zh-CN" data-marpit-pagination="12" style="--paginate:true;--header:AI 全栈培训;--footer:第三部分：API 与参数;--theme:oyqjhy2jci8rrucl5kfxrgyvchpg92ob5b6nxa3sut;" data-marpit-pagination-total="15">
<header>AI 全栈培训</header>
<h1 id="claude-api-%E6%A0%BC%E5%BC%8Fanthropic">Claude API 格式（Anthropic）</h1>
<h3 id="%E8%AF%B7%E6%B1%82%E7%A4%BA%E4%BE%8B-1">请求示例</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">curl https://api.anthropic.com/v1/messages \
  -H <span class="hljs-string">&quot;x-api-key: <span class="hljs-variable">$ANTHROPIC_API_KEY</span>&quot;</span> \
  -H <span class="hljs-string">&quot;anthropic-version: 2023-06-01&quot;</span> \
  -H <span class="hljs-string">&quot;Content-Type: application/json&quot;</span> \
  -d <span class="hljs-string">&#x27;{
    &quot;model&quot;: &quot;claude-sonnet-4-20250514&quot;,
    &quot;max_tokens&quot;: 1024,
    &quot;system&quot;: &quot;你是资深后端工程师&quot;,
    &quot;messages&quot;: [
      {&quot;role&quot;: &quot;user&quot;, &quot;content&quot;: &quot;解释RESTful API设计原则&quot;}
    ]
  }&#x27;</span>
</code></pre>
<h3 id="claude-%E7%89%B9%E7%82%B9">Claude 特点</h3>
<ul>
<li><strong>认证方式：</strong> <code>x-api-key</code> 自定义头 + <code>anthropic-version</code> 版本号（必填）</li>
<li><strong>消息格式：</strong> <code>system</code> 是顶层字段（不在 messages 里），<code>messages</code> 只有 <code>user</code> / <code>assistant</code></li>
<li><strong>工具调用：</strong> <code>tool_use</code> blocks，与 OpenAI 的 <code>function calling</code> 语法不同</li>
<li><strong>强项：</strong> 200K 超长上下文、代码能力强、安全对齐好</li>
</ul>
<blockquote>
<p><strong>关键差异：</strong> Claude 的 <code>system</code> 提示词不在 messages 数组里，是单独的顶层字段。<code>max_tokens</code> 是必填参数。</p>
</blockquote>
<footer>第三部分：API 与参数</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="13" data-paginate="true" data-header="AI 全栈培训" data-footer="第三部分：API 与参数" data-theme="oyqjhy2jci8rrucl5kfxrgyvchpg92ob5b6nxa3sut" lang="zh-CN" data-marpit-pagination="13" style="--paginate:true;--header:AI 全栈培训;--footer:第三部分：API 与参数;--theme:oyqjhy2jci8rrucl5kfxrgyvchpg92ob5b6nxa3sut;" data-marpit-pagination-total="15">
<header>AI 全栈培训</header>
<h1 id="gemini-api-%E6%A0%BC%E5%BC%8Fgoogle">Gemini API 格式（Google）</h1>
<h3 id="%E8%AF%B7%E6%B1%82%E7%A4%BA%E4%BE%8B-2">请求示例</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">curl <span class="hljs-string">&quot;https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=<span class="hljs-variable">$GOOGLE_API_KEY</span>&quot;</span> \
  -H <span class="hljs-string">&quot;Content-Type: application/json&quot;</span> \
  -d <span class="hljs-string">&#x27;{
    &quot;system_instruction&quot;: {
      &quot;parts&quot;: [{&quot;text&quot;: &quot;你是资深后端工程师&quot;}]
    },
    &quot;contents&quot;: [
      {
        &quot;role&quot;: &quot;user&quot;,
        &quot;parts&quot;: [{&quot;text&quot;: &quot;解释RESTful API设计原则&quot;}]
      }
    ],
    &quot;generationConfig&quot;: {
      &quot;temperature&quot;: 0.3,
      &quot;maxOutputTokens&quot;: 1024,
      &quot;topP&quot;: 0.95,
      &quot;topK&quot;: 40
    }
  }&#x27;</span>
</code></pre>
<h3 id="gemini-%E7%89%B9%E7%82%B9">Gemini 特点</h3>
<ul>
<li><strong>认证方式：</strong> API Key 直接放在 URL 参数里（<code>?key=</code>）</li>
<li><strong>消息格式：</strong> <code>contents</code> 数组，每条消息用 <code>parts</code> 包裹，支持多模态混排</li>
<li><strong>参数命名：</strong> <code>maxOutputTokens</code>（驼峰）、<code>topP</code>、<code>topK</code> —— 命名风格不同</li>
<li><strong>强项：</strong> 原生多模态、200 万 token 超长上下文、免费额度最多</li>
</ul>
<footer>第三部分：API 与参数</footer>
</section>

<header>AI 全栈培训</header>

<h1 id="%E4%B8%89%E5%A4%A7-api-%E5%85%B3%E9%94%AE%E5%B7%AE%E5%BC%82%E6%80%BB%E7%BB%93">三大 API 关键差异总结</h1>
<table>
<thead>
<tr>
<th>对比项</th>
<th style="text-align:center">OpenAI (GPT)</th>
<th style="text-align:center">Anthropic (Claude)</th>
<th style="text-align:center">Google (Gemini)</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>认证方式</strong></td>
<td style="text-align:center"><code>Authorization: Bearer</code></td>
<td style="text-align:center"><code>x-api-key</code> 头</td>
<td style="text-align:center">URL 参数 <code>?key=</code></td>
</tr>
<tr>
<td><strong>System 提示词</strong></td>
<td style="text-align:center"><code>messages</code> 里的 <code>system</code> 角色</td>
<td style="text-align:center">顶层 <code>system</code> 字段</td>
<td style="text-align:center"><code>system_instruction.parts</code></td>
</tr>
<tr>
<td><strong>消息格式</strong></td>
<td style="text-align:center"><code>messages[].content</code></td>
<td style="text-align:center"><code>messages[].content</code></td>
<td style="text-align:center"><code>contents[].parts[].text</code></td>
</tr>
<tr>
<td><strong>工具调用</strong></td>
<td style="text-align:center"><code>function calling</code></td>
<td style="text-align:center"><code>tool_use</code> blocks</td>
<td style="text-align:center"><code>functionDeclarations</code></td>
</tr>
<tr>
<td><strong>流式输出</strong></td>
<td style="text-align:center"><code>stream: true</code> + SSE</td>
<td style="text-align:center"><code>stream: true</code> + SSE</td>
<td style="text-align:center"><code>streamGenerateContent</code></td>
</tr>
<tr>
<td><strong>多模态输入</strong></td>
<td style="text-align:center"><code>image_url</code> 在 content 里</td>
<td style="text-align:center"><code>image</code> media type</td>
<td style="text-align:center"><code>parts</code> 里混排</td>
</tr>
<tr>
<td><strong>max_tokens</strong></td>
<td style="text-align:center">可选（有默认值）</td>
<td style="text-align:center"><strong>必填</strong></td>
<td style="text-align:center"><code>maxOutputTokens</code>（可选）</td>
</tr>
<tr>
<td><strong>支持 top_k</strong></td>
<td style="text-align:center">不支持</td>
<td style="text-align:center">支持</td>
<td style="text-align:center">支持</td>
</tr>
</tbody>
</table>
<div class="callout-blue">
<p><strong>实战建议：</strong> 三家 API 核心逻辑一样（发 prompt，收回答），差异在认证方式和字段命名。建议用 Python SDK 封装差异，代码更干净。</p>
</div>
<footer>第三部分：API 与参数</footer>
</section>
