<h1 id="ai-%E5%85%A8%E6%A0%88%E5%9F%B9%E8%AE%AD">AI 全栈培训</h1>
<h2 id="%E4%BB%8E%E9%9B%B6%E5%88%B0%E5%AE%9E%E6%88%98--%E6%8A%80%E6%9C%AF%E5%9B%A2%E9%98%9F-ai-%E8%83%BD%E5%8A%9B%E5%BB%BA%E8%AE%BE">从零到实战 — 技术团队 AI 能力建设</h2>
<p>第一部分：认知颠覆</p>
<p>2026 年 · 内部培训</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="2" data-paginate="true" data-header="AI 全栈培训" data-footer="第一部分：认知颠覆" data-theme="albxjw70lb95s91hxy55fd2ydvkdes4origd5ep3l6" lang="zh-CN" data-marpit-pagination="2" style="--paginate:true;--header:AI 全栈培训;--footer:第一部分：认知颠覆;--theme:albxjw70lb95s91hxy55fd2ydvkdes4origd5ep3l6;" data-marpit-pagination-total="16">
<header>AI 全栈培训</header>
<h1 id="%E4%BD%A0%E7%9C%9F%E7%9A%84%E4%BC%9A%E7%94%A8-ai-%E5%90%97">你真的会用 AI 吗？</h1>
<p>一个扎心的事实：绝大多数人把 AI 当成了&quot;高级搜索引擎&quot;。</p>
<div class="callout">
<p><strong>真实数据：90% 的用户只会用 AI 做基础对话</strong><br />
— 问个问题，得到答案，然后关掉。这和用百度有什么区别？</p>
</div>
<h3 id="%E5%B8%B8%E8%A7%81%E7%9A%84%E5%88%9D%E7%BA%A7%E7%94%A8%E6%B3%95">常见的&quot;初级用法&quot;</h3>
<ul>
<li>&quot;帮我翻译一下这段话&quot; — 把 AI 当翻译机</li>
<li>&quot;Python 怎么读文件？&quot; — 把 AI 当 Stack Overflow</li>
<li>&quot;写一封邮件&quot; — 把 AI 当模板生成器</li>
</ul>
<blockquote>
<p>这些用法没有错，但你只用了 AI <strong>不到 10%</strong> 的能力。<br />
就像你买了一台电脑，却只用它看天气预报。</p>
</blockquote>
<footer>第一部分：认知颠覆</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="3" data-paginate="true" data-header="AI 全栈培训" data-footer="第一部分：认知颠覆" data-theme="albxjw70lb95s91hxy55fd2ydvkdes4origd5ep3l6" lang="zh-CN" data-marpit-pagination="3" style="--paginate:true;--header:AI 全栈培训;--footer:第一部分：认知颠覆;--theme:albxjw70lb95s91hxy55fd2ydvkdes4origd5ep3l6;" data-marpit-pagination-total="16">
<header>AI 全栈培训</header>
<h1 id="%E9%AB%98%E4%BD%8D%E6%88%AA%E7%98%AB%E7%9A%84%E5%A4%A9%E6%89%8D">&quot;高位截瘫的天才&quot;</h1>
<p>在深入之前，先建立一个关键认知 — 纯大模型<strong>有脑无手</strong>。</p>
<div class="columns">
<div class="col">
<h3 id="%E7%BA%AF%E5%A4%A7%E6%A8%A1%E5%9E%8Bchatgpt-%E7%BD%91%E9%A1%B5%E7%89%88">纯大模型（ChatGPT 网页版）</h3>
<p><strong>= 高位截瘫的天才</strong></p>
<ul>
<li>脑子极其好用：推理、写作、分析、创意</li>
<li>但<strong>没有手脚</strong> — 不能操作你的电脑</li>
<li>不能读文件、不能跑代码、不能调接口</li>
<li>你问它，它只能&quot;纸上谈兵&quot;</li>
</ul>
</div>
<div class="col">
<h3 id="agentopenclaw--cursor">Agent（OpenClaw / Cursor）</h3>
<p><strong>= 给天才装上了机甲</strong></p>
<ul>
<li><code>Agent = LLM + Tools + Memory + Planning</code></li>
<li>不仅能想，还能<strong>动手干活</strong></li>
<li>读写文件、执行代码、浏览网页、调用 API</li>
<li>遇到错误会<strong>自动重试和修正</strong></li>
</ul>
</div>
</div>
<div class="callout">
<p><strong>预告：</strong> 第 5 章会详细讲 OpenClaw 怎么给 AI &quot;穿机甲&quot; — 它本身没有脑子，但提供了手脚（操作电脑的权限）。把大模型装进去，AI 就能自动干活了。</p>
</div>
<footer>第一部分：认知颠覆</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="4" data-paginate="true" data-header="AI 全栈培训" data-footer="第一部分：认知颠覆" data-class="highlight" data-theme="albxjw70lb95s91hxy55fd2ydvkdes4origd5ep3l6" lang="zh-CN" class="highlight" data-marpit-pagination="4" style="--paginate:true;--header:AI 全栈培训;--footer:第一部分：认知颠覆;--class:highlight;--theme:albxjw70lb95s91hxy55fd2ydvkdes4origd5ep3l6;" data-marpit-pagination-total="16">
<header>AI 全栈培训</header>

<h1 id="ai-%E4%B8%8D%E6%98%AF%E5%B7%A5%E5%85%B7%E6%98%AF%E4%BA%BA">AI 不是工具，是&quot;人&quot;</h1>
<p>这是今天最重要的一句话，也是整个培训的核心理念：</p>
<div class="callout-blue">
<p><strong>别把 AI 当工具，把 AI 当人。</strong></p>
<p>工具是被动的 — 你按按钮，它执行动作。<br />
人是主动的 — 你给背景，它理解意图、规划方案、自主完成。</p>
</div>
<h3 id="ai-%E8%83%BD%E5%81%9A%E4%BB%80%E4%B9%88%E5%B7%A5%E5%85%B7%E5%81%9A%E4%B8%8D%E5%88%B0%E7%9A%84%E4%BA%8B">AI 能做什么&quot;工具&quot;做不到的事？</h3>
<table>
<thead>
<tr>
<th>维度</th>
<th>传统工具</th>
<th>AI（当人用）</th>
</tr>
</thead>
<tbody>
<tr>
<td>理解能力</td>
<td>只认关键词</td>
<td>理解上下文、语义、意图</td>
</tr>
<tr>
<td>执行方式</td>
<td>固定流程</td>
<td>根据情况灵活调整</td>
</tr>
<tr>
<td>输出质量</td>
<td>千篇一律</td>
<td>因人而异、因场景而异</td>
</tr>
<tr>
<td>协作方式</td>
<td>单次输入/输出</td>
<td>多轮对话、持续迭代</td>
</tr>
</tbody>
</table>
<footer>第一部分：认知颠覆</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" data-paginate="true" data-header="AI 全栈培训" data-footer="第一部分：认知颠覆" data-theme="albxjw70lb95s91hxy55fd2ydvkdes4origd5ep3l6" lang="zh-CN" data-marpit-pagination="5" style="--paginate:true;--header:AI 全栈培训;--footer:第一部分：认知颠覆;--theme:albxjw70lb95s91hxy55fd2ydvkdes4origd5ep3l6;" data-marpit-pagination-total="16">
<header>AI 全栈培训</header>
<h1 id="%E8%81%8A%E5%A4%A9%E5%BC%8F-vs-%E5%BD%93%E4%BA%BA%E7%94%A8">&quot;聊天式&quot; vs &quot;当人用&quot;</h1>
<p>同一个需求，两种截然不同的使用方式：</p>
<div class="columns">
<div class="col">
<h3 id="%E8%81%8A%E5%A4%A9%E5%BC%8F%E5%88%9D%E7%BA%A7">聊天式（初级）</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-text">用户：帮我写个排序函数

AI：好的，这是一个冒泡排序...
</code></pre>
<p><strong>结果：</strong> 得到一个教科书级别的通用代码，和你的业务毫无关系。</p>
</div>
<div class="col">
<h3 id="%E5%BD%93%E4%BA%BA%E7%94%A8%E9%AB%98%E7%BA%A7">当人用（高级）</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-text">用户：你是资深 Go 工程师，负责
订单处理模块。需要对百万级请求日志按
时间排序，要求：
- 内存占用最小（容器限制 2GB）
- 支持增量排序（实时日志流入）
- 排序中断后可恢复
</code></pre>
<p><strong>结果：</strong> 得到针对高并发场景优化的生产级代码，附带内存分析和边界处理。</p>
</div>
</div>
<footer>第一部分：认知颠覆</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" data-paginate="true" data-header="AI 全栈培训" data-footer="第一部分：认知颠覆" data-theme="albxjw70lb95s91hxy55fd2ydvkdes4origd5ep3l6" lang="zh-CN" data-marpit-pagination="6" style="--paginate:true;--header:AI 全栈培训;--footer:第一部分：认知颠覆;--theme:albxjw70lb95s91hxy55fd2ydvkdes4origd5ep3l6;" data-marpit-pagination-total="16">
<header>AI 全栈培训</header>
<h1 id="%E4%BB%80%E4%B9%88%E6%98%AF-ai">什么是 AI？</h1>
<p>从&quot;规则&quot;到&quot;学习&quot;，AI 的演进之路：</p>
<table>
<thead>
<tr>
<th>年代</th>
<th>阶段</th>
<th>核心思路</th>
<th>软件开发类比</th>
</tr>
</thead>
<tbody>
<tr>
<td>1950s</td>
<td><strong>规则系统</strong></td>
<td>人写 if-else 规则</td>
<td>硬编码配置：写死在代码里的业务规则</td>
</tr>
<tr>
<td>1990s</td>
<td><strong>机器学习</strong></td>
<td>从数据中找规律</td>
<td>推荐系统：根据用户行为数据预测偏好</td>
</tr>
<tr>
<td>2012</td>
<td><strong>深度学习</strong></td>
<td>多层神经网络</td>
<td>图像识别：自动识别验证码和图片内容</td>
</tr>
<tr>
<td>2017</td>
<td><strong>Transformer</strong></td>
<td>注意力机制</td>
<td>理解整句话的含义，而不是逐字匹配</td>
</tr>
<tr>
<td>2022+</td>
<td><strong>大语言模型</strong></td>
<td>通用智能涌现</td>
<td>一个&quot;什么都懂&quot;的全能助手</td>
</tr>
</tbody>
</table>
<div class="callout-blue">
<p><strong>关键转折点：</strong> 2017 年 Google 发表论文 <em>&quot;Attention Is All You Need&quot;</em>，<br />
Transformer 架构诞生，开启了今天大模型时代的序幕。</p>
</div>
<footer>第一部分：认知颠覆</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" data-paginate="true" data-header="AI 全栈培训" data-footer="第一部分：认知颠覆" data-theme="albxjw70lb95s91hxy55fd2ydvkdes4origd5ep3l6" lang="zh-CN" data-marpit-pagination="7" style="--paginate:true;--header:AI 全栈培训;--footer:第一部分：认知颠覆;--theme:albxjw70lb95s91hxy55fd2ydvkdes4origd5ep3l6;" data-marpit-pagination-total="16">
<header>AI 全栈培训</header>
<h1 id="%E4%BB%80%E4%B9%88%E6%98%AF-agi">什么是 AGI？</h1>
<p><strong>AGI = Artificial General Intelligence（通用人工智能）</strong></p>
<p>能像人类一样完成<strong>任何</strong>智力任务的 AI。</p>
<h3 id="%E4%BB%8A%E5%A4%A9%E7%9A%84-ai-vs-agi">今天的 AI vs AGI</h3>
<div class="columns">
<div class="col">
<p><strong>今天的 AI（窄 AI）</strong></p>
<ul>
<li>写代码很强，但不会修水管</li>
<li>翻译很好，但不理解文化</li>
<li>下棋能赢世界冠军，但不会过马路</li>
<li>每个能力需要专门训练</li>
</ul>
</div>
<div class="col">
<p><strong>AGI（通用 AI）</strong></p>
<ul>
<li>学一个领域能迁移到另一个</li>
<li>理解抽象概念和常识</li>
<li>具备自主学习和推理能力</li>
<li>无需针对每个任务专门训练</li>
</ul>
</div>
</div>
<blockquote>
<p><strong>现状：</strong> 我们离 AGI 还有距离，但大语言模型展现出的&quot;涌现能力&quot;<br />
让很多研究者认为，我们可能比想象中更接近。OpenAI 的目标就是实现 AGI。</p>
</blockquote>
<footer>第一部分：认知颠覆</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" data-paginate="true" data-header="AI 全栈培训" data-footer="第一部分：认知颠覆" data-theme="albxjw70lb95s91hxy55fd2ydvkdes4origd5ep3l6" lang="zh-CN" data-marpit-pagination="8" style="--paginate:true;--header:AI 全栈培训;--footer:第一部分：认知颠覆;--theme:albxjw70lb95s91hxy55fd2ydvkdes4origd5ep3l6;" data-marpit-pagination-total="16">
<header>AI 全栈培训</header>
<h1 id="%E4%BB%80%E4%B9%88%E6%98%AF-asi">什么是 ASI？</h1>
<p><strong>ASI = Artificial Super Intelligence（超级人工智能）</strong></p>
<p>在<strong>所有</strong>智力维度上全面超越人类最优秀个体的 AI。</p>
<h3 id="%E4%BB%8E%E8%AE%A1%E7%AE%97%E5%99%A8%E5%88%B0%E8%B6%85%E7%BA%A7%E6%99%BA%E8%83%BD">从计算器到超级智能</h3>
<table>
<thead>
<tr>
<th>阶段</th>
<th>类比</th>
<th>与人类的关系</th>
</tr>
</thead>
<tbody>
<tr>
<td>传统软件</td>
<td>计算器</td>
<td>算得快，但你告诉它算什么</td>
</tr>
<tr>
<td>今天的 AI</td>
<td>聪明的实习生</td>
<td>能力强，但需要指导和监督</td>
</tr>
<tr>
<td>AGI</td>
<td>全能同事</td>
<td>任何智力工作都能独立完成</td>
</tr>
<tr>
<td><strong>ASI</strong></td>
<td><strong>？？？</strong></td>
<td><strong>超越人类理解的智能水平</strong></td>
</tr>
</tbody>
</table>
<div class="callout">
<p><strong>重要提醒：</strong> ASI 目前是纯理论概念，尚无公认的实现路径。<br />
但它是 AI 安全研究的核心关注点 — 如果真的出现，<br />
我们如何确保它与人类的价值观对齐？这是 Anthropic（Claude 的公司）成立的初衷。</p>
</div>
<footer>第一部分：认知颠覆</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" data-paginate="true" data-header="AI 全栈培训" data-footer="第一部分：认知颠覆" data-theme="albxjw70lb95s91hxy55fd2ydvkdes4origd5ep3l6" lang="zh-CN" data-marpit-pagination="9" style="--paginate:true;--header:AI 全栈培训;--footer:第一部分：认知颠覆;--theme:albxjw70lb95s91hxy55fd2ydvkdes4origd5ep3l6;" data-marpit-pagination-total="16">
<header>AI 全栈培训</header>
<h1 id="ai-%E7%9A%84%E5%A4%A7%E8%84%91transformer">AI 的&quot;大脑&quot;：Transformer</h1>
<p>不讲数学公式，用一个比喻来理解 Transformer 的核心 — <strong>注意力机制</strong>。</p>
<h3 id="%E6%AF%94%E5%96%BB%E5%BF%AB%E9%80%92%E5%88%86%E6%8B%A3%E4%B8%AD%E5%BF%83">比喻：快递分拣中心</h3>
<p>想象你在一个快递分拣中心工作：</p>
<ol>
<li><strong>收到一批包裹（输入文本）</strong> — 每个包裹上有地址信息（每个词有含义）</li>
<li><strong>查看所有包裹（自注意力）</strong> — 分拣员不是只看一个包裹，而是<strong>同时看所有包裹</strong>，理解它们之间的关系（&quot;这批都是发往上海的&quot;、&quot;这两个是同一个客户的&quot;）</li>
<li><strong>标注优先级（注意力权重）</strong> — 对每个包裹，判断其他包裹与它的关联程度。急件关注时效，大件关注路线</li>
<li><strong>分拣输出（生成结果）</strong> — 基于对全局的理解，把每个包裹送到正确的位置</li>
</ol>
<div class="callout-blue">
<p><strong>核心洞察：</strong> 传统模型像流水线，一个一个处理。Transformer 像一个经验丰富的分拣员，一眼看全局，效率和准确率都大幅提升。这就是为什么 AI 能&quot;理解&quot;长文本。</p>
</div>
<footer>第一部分：认知颠覆</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" data-paginate="true" data-header="AI 全栈培训" data-footer="第一部分：认知颠覆" data-theme="albxjw70lb95s91hxy55fd2ydvkdes4origd5ep3l6" lang="zh-CN" data-marpit-pagination="10" style="--paginate:true;--header:AI 全栈培训;--footer:第一部分：认知颠覆;--theme:albxjw70lb95s91hxy55fd2ydvkdes4origd5ep3l6;" data-marpit-pagination-total="16">
<header>AI 全栈培训</header>
<h1 id="%E9%A2%84%E8%AE%AD%E7%BB%83%E8%AF%BB%E9%81%8D%E4%BA%92%E8%81%94%E7%BD%91">预训练：读遍互联网</h1>
<p>大语言模型在&quot;上岗&quot;之前，经历了一场超级特训。</p>
<h3 id="%E7%B1%BB%E6%AF%94%E6%96%B0%E5%91%98%E5%B7%A5%E5%85%A5%E8%81%8C">类比：新员工入职</h3>
<p>想象公司来了一个新员工，但他入职前做了一件疯狂的事：</p>
<p><strong>把公司成立以来的所有文档、邮件、会议记录、代码仓库全部读了一遍。</strong></p>
<p>这就是预训练 — AI 在和你对话之前，已经&quot;读&quot;过了：</p>
<table>
<thead>
<tr>
<th>数据来源</th>
<th>规模</th>
<th>相当于</th>
</tr>
</thead>
<tbody>
<tr>
<td>互联网网页</td>
<td>数万亿 token</td>
<td>数百万本书的文字量</td>
</tr>
<tr>
<td>开源代码</td>
<td>GitHub 等平台</td>
<td>几乎所有公开的代码仓库</td>
</tr>
<tr>
<td>学术论文</td>
<td>数百万篇</td>
<td>大部分公开学术知识</td>
</tr>
<tr>
<td>书籍</td>
<td>数十万本</td>
<td>一座大型图书馆</td>
</tr>
</tbody>
</table>
<blockquote>
<p><strong>GPT-4 的训练数据约 13 万亿 token。</strong><br />
一个人一辈子能读的书大约 5000 本，GPT-4 相当于读了数十万倍。</p>
</blockquote>
<footer>第一部分：认知颠覆</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" data-paginate="true" data-header="AI 全栈培训" data-footer="第一部分：认知颠覆" data-theme="albxjw70lb95s91hxy55fd2ydvkdes4origd5ep3l6" lang="zh-CN" data-marpit-pagination="11" style="--paginate:true;--header:AI 全栈培训;--footer:第一部分：认知颠覆;--theme:albxjw70lb95s91hxy55fd2ydvkdes4origd5ep3l6;" data-marpit-pagination-total="16">
<header>AI 全栈培训</header>
<h1 id="%E4%B8%BA%E4%BB%80%E4%B9%88-ai-%E8%83%BD%E7%90%86%E8%A7%A3%E4%BD%A0%E8%AF%B4%E7%9A%84%E8%AF%9D">为什么 AI 能&quot;理解&quot;你说的话？</h1>
<p>从你打字到 AI 回复，背后发生了什么？</p>
<h3 id="%E5%A4%84%E7%90%86%E6%B5%81%E6%B0%B4%E7%BA%BF%E7%B1%BB%E6%AF%94-http-%E8%AF%B7%E6%B1%82%E5%A4%84%E7%90%86">处理流水线（类比 HTTP 请求处理）</h3>
<table>
<thead>
<tr>
<th>步骤</th>
<th>AI 处理</th>
<th>HTTP 类比</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>1. 接收输入</strong></td>
<td>收到你的文本</td>
<td>服务器接收 HTTP 请求</td>
</tr>
<tr>
<td><strong>2. Tokenization（分词）</strong></td>
<td>&quot;你好世界&quot; → [&quot;你好&quot;, &quot;世界&quot;]</td>
<td>解析请求头、路径、参数</td>
</tr>
<tr>
<td><strong>3. Embedding（向量化）</strong></td>
<td>每个词变成一串数字（768维向量）</td>
<td>将请求参数序列化为内部数据结构</td>
</tr>
<tr>
<td><strong>4. Attention（注意力计算）</strong></td>
<td>理解词与词之间的关系</td>
<td>路由匹配 + 中间件逐层校验</td>
</tr>
<tr>
<td><strong>5. Generation（生成）</strong></td>
<td>逐字预测下一个最可能的词</td>
<td>逐步执行业务逻辑、组装响应体</td>
</tr>
</tbody>
</table>
<div class="callout-blue">
<p><strong>关键理解：</strong> AI 不是&quot;搜索答案&quot;，而是根据理解<strong>逐字生成</strong>回复。<br />
每一个字都是基于前文的概率预测。这就是为什么同一个问题，每次回答可能略有不同。</p>
</div>
<footer>第一部分：认知颠覆</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" data-paginate="true" data-header="AI 全栈培训" data-footer="第一部分：认知颠覆" data-theme="albxjw70lb95s91hxy55fd2ydvkdes4origd5ep3l6" lang="zh-CN" data-marpit-pagination="12" style="--paginate:true;--header:AI 全栈培训;--footer:第一部分：认知颠覆;--theme:albxjw70lb95s91hxy55fd2ydvkdes4origd5ep3l6;" data-marpit-pagination-total="16">
<header>AI 全栈培训</header>
<h1 id="%E5%A4%9A%E6%A8%A1%E6%80%81%E4%B8%8D%E5%8F%AA%E4%BC%9A%E8%AF%BB%E5%AD%97">多模态：不只会读字</h1>
<p><strong>多模态（Multimodal）= 能处理多种类型的信息</strong></p>
<p>就像人类可以同时看、听、读、写，AI 也在走向全感官。</p>
<table>
<thead>
<tr>
<th>能力</th>
<th>GPT-4o</th>
<th>Claude 3.5</th>
<th>Gemini 2.0</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>文本理解</strong></td>
<td>★★★★★</td>
<td>★★★★★</td>
<td>★★★★★</td>
</tr>
<tr>
<td><strong>图片理解</strong></td>
<td>★★★★★</td>
<td>★★★★★</td>
<td>★★★★★</td>
</tr>
<tr>
<td><strong>语音输入</strong></td>
<td>★★★★★</td>
<td>★★★☆☆</td>
<td>★★★★★</td>
</tr>
<tr>
<td><strong>语音输出</strong></td>
<td>★★★★★</td>
<td>★★☆☆☆</td>
<td>★★★★★</td>
</tr>
<tr>
<td><strong>视频理解</strong></td>
<td>★★★☆☆</td>
<td>★★☆☆☆</td>
<td>★★★★★</td>
</tr>
<tr>
<td><strong>代码生成</strong></td>
<td>★★★★☆</td>
<td>★★★★★</td>
<td>★★★★☆</td>
</tr>
</tbody>
</table>
<blockquote>
<p><strong>趋势：</strong> 多模态是大模型的核心发展方向。未来的 AI 不仅能读你的文字，<br />
还能看你的屏幕、听你的语音、理解你的手势。</p>
</blockquote>
<footer>第一部分：认知颠覆</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="13" data-paginate="true" data-header="AI 全栈培训" data-footer="第一部分：认知颠覆" data-theme="albxjw70lb95s91hxy55fd2ydvkdes4origd5ep3l6" lang="zh-CN" data-marpit-pagination="13" style="--paginate:true;--header:AI 全栈培训;--footer:第一部分：认知颠覆;--theme:albxjw70lb95s91hxy55fd2ydvkdes4origd5ep3l6;" data-marpit-pagination-total="16">
<header>AI 全栈培训</header>
<h1 id="%E5%A4%9A%E6%A8%A1%E6%80%81%E5%AE%9E%E9%99%85%E8%83%BD%E5%B9%B2%E5%98%9B">多模态实际能干嘛？</h1>
<p>别只停留在概念，看看实际应用场景：</p>
<h3 id="%E4%B8%8E%E6%97%A5%E5%B8%B8%E5%BC%80%E5%8F%91%E7%9B%B4%E6%8E%A5%E7%9B%B8%E5%85%B3%E7%9A%84%E5%9C%BA%E6%99%AF">与日常开发直接相关的场景</h3>
<table>
<thead>
<tr>
<th>场景</th>
<th>输入</th>
<th>AI 输出</th>
<th>价值</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>故障诊断</strong></td>
<td>截图报错页面或终端输出</td>
<td>分析错误原因 + 解决步骤</td>
<td>减少排障时间</td>
</tr>
<tr>
<td><strong>文档识别</strong></td>
<td>拍一张纸质文档照片</td>
<td>结构化数据（JSON）</td>
<td>快速数字化录入</td>
</tr>
<tr>
<td><strong>文档理解</strong></td>
<td>上传技术手册 PDF</td>
<td>回答关于手册的问题</td>
<td>新人快速上手</td>
</tr>
<tr>
<td><strong>UI 审查</strong></td>
<td>截图应用界面</td>
<td>发现布局问题/改进建议</td>
<td>提升用户体验</td>
</tr>
</tbody>
</table>
<h3 id="%E6%9B%B4%E5%B9%BF%E6%B3%9B%E7%9A%84%E5%BA%94%E7%94%A8">更广泛的应用</h3>
<ul>
<li><strong>语音指令 → 代码生成：</strong> 口述需求，AI 直接写代码</li>
<li><strong>生产线视频 → 质检报告：</strong> 摄像头拍视频，AI 检测不良品</li>
<li><strong>手绘草图 → 原型设计：</strong> 在纸上画一个界面，AI 生成可运行的前端代码</li>
</ul>
<footer>第一部分：认知颠覆</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" data-paginate="true" data-header="AI 全栈培训" data-footer="第一部分：认知颠覆" data-class="highlight" data-theme="albxjw70lb95s91hxy55fd2ydvkdes4origd5ep3l6" lang="zh-CN" class="highlight" data-marpit-pagination="14" style="--paginate:true;--header:AI 全栈培训;--footer:第一部分：认知颠覆;--class:highlight;--theme:albxjw70lb95s91hxy55fd2ydvkdes4origd5ep3l6;" data-marpit-pagination-total="16">
<header>AI 全栈培训</header>

<h1 id="%E6%8F%90%E7%A4%BA%E8%AF%8D-%E2%89%A0-%E9%97%AE%E9%97%AE%E9%A2%98">提示词 ≠ 问问题</h1>
<p><strong>Prompt Engineering（提示词工程）本质上是在写&quot;工作说明书&quot;，不是在&quot;问问题&quot;。</strong></p>
<p>把 AI 当人，你要给它的不是一个问题，而是一份完整的任务简报：</p>
<h3 id="%E5%9B%9B%E4%B8%AA%E6%A0%B8%E5%BF%83%E8%A6%81%E7%B4%A0">四个核心要素</h3>
<table>
<thead>
<tr>
<th>要素</th>
<th>作用</th>
<th>例子</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Role（角色设定）</strong></td>
<td>告诉 AI 它是谁</td>
<td>&quot;你是有 10 年经验的后端系统架构师&quot;</td>
</tr>
<tr>
<td><strong>Context（上下文）</strong></td>
<td>给出背景信息</td>
<td>&quot;我们的服务运行在 K8s 上，单 Pod 限制 2GB 内存&quot;</td>
</tr>
<tr>
<td><strong>Constraints（约束条件）</strong></td>
<td>明确限制和要求</td>
<td>&quot;代码必须兼容 Go 1.18，不能用第三方库&quot;</td>
</tr>
<tr>
<td><strong>Output Format（输出格式）</strong></td>
<td>规定输出形式</td>
<td>&quot;用 Markdown 表格对比，最后给出推荐方案&quot;</td>
</tr>
</tbody>
</table>
<div class="callout">
<p><strong>记住：</strong> 你给 AI 的信息越详细，AI 给你的结果就越精准。<br />
就像你给新同事布置任务 — 说得越清楚，活干得越好。</p>
</div>
<footer>第一部分：认知颠覆</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" data-paginate="true" data-header="AI 全栈培训" data-footer="第一部分：认知颠覆" data-theme="albxjw70lb95s91hxy55fd2ydvkdes4origd5ep3l6" lang="zh-CN" data-marpit-pagination="15" style="--paginate:true;--header:AI 全栈培训;--footer:第一部分：认知颠覆;--theme:albxjw70lb95s91hxy55fd2ydvkdes4origd5ep3l6;" data-marpit-pagination-total="16">
<header>AI 全栈培训</header>
<h1 id="system--user--assistant">System / User / Assistant</h1>
<p>AI 对话的三个角色，用公司管理来理解：</p>
<h3 id="%E4%B8%89%E8%A7%92%E8%89%B2%E6%A8%A1%E5%9E%8B">三角色模型</h3>
<table>
<thead>
<tr>
<th>角色</th>
<th>AI 对话</th>
<th>公司类比</th>
<th>作用</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>System</strong></td>
<td>系统提示词</td>
<td>公司制度和文化</td>
<td>设定 AI 的行为准则、身份、能力边界</td>
</tr>
<tr>
<td><strong>User</strong></td>
<td>用户消息</td>
<td>员工下达的具体任务</td>
<td>提供需求、上下文、约束条件</td>
</tr>
<tr>
<td><strong>Assistant</strong></td>

<h1 id="%E5%B0%8F%E7%BB%93%E4%BB%8E%E4%BB%8A%E5%A4%A9%E8%B5%B7%E6%8A%8A-ai-%E5%BD%93%E5%90%8C%E4%BA%8B">小结：从今天起，把 AI 当同事</h1>
<h3 id="%E4%B8%89%E4%B8%AA%E8%AE%A4%E7%9F%A5%E5%8D%87%E7%BA%A7">三个认知升级</h3>
<ol>
<li><strong>AI 不是搜索引擎</strong> — 它能理解上下文、进行推理、生成创造性内容</li>
<li><strong>提示词不是搜索关键词</strong> — 它是工作说明书，越详细越好</li>
<li><strong>对话不是一次性的</strong> — 它是持续协作，可以多轮迭代优化结果</li>
</ol>
<h3 id="%E4%BB%8E%E7%8E%B0%E5%9C%A8%E5%BC%80%E5%A7%8B%E7%9A%84%E8%A1%8C%E5%8A%A8%E6%8C%87%E5%8D%97">从现在开始的行动指南</h3>
<table>
<thead>
<tr>
<th>以前的做法</th>
<th>现在的做法</th>
</tr>
</thead>
<tbody>
<tr>
<td>&quot;帮我写个函数&quot;</td>
<td>&quot;你是 XX 工程师，背景是 XX，需要实现 XX，约束是 XX&quot;</td>
</tr>
<tr>
<td>一句话问完就走</td>
<td>多轮对话，持续追问和优化</td>
</tr>
<tr>
<td>只用文字</td>
<td>文字 + 截图 + 代码 + 文档，多模态输入</td>
</tr>
<tr>
<td>照搬 AI 的输出</td>
<td>审查、测试、迭代，AI 是助手不是权威</td>
</tr>
</tbody>
</table>
<div class="callout">
<p><strong>核心理念：把 AI 当一个刚入职的、聪明但不了解你业务的新同事。</strong><br />
你的任务是：给清楚的背景、明确的要求、合理的约束。它会回报你高质量的成果。</p>
</div>
